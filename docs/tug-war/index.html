<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🪢 Tug of War Math</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --red:      #d42828;
    --red-bg:   #fff0f0;
    --blue:     #2050d4;
    --blue-bg:  #f0f4ff;
    --bg:       #eef0fb;
    --ink:      #1a1a2e;
    --ink-lt:   #555577;
    --green:    #4caf50;
    --green-dk: #2e7d32;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--ink);
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── PORTRAIT WARNING ─────────────────────────── */
  #portraitWarn {
    display: none;
    position: fixed; inset: 0; z-index: 9999;
    background: #1a1a2e; color: white;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 1.2rem;
    text-align: center; padding: 2rem;
  }
  #portraitWarn .wi { font-size: 5rem; animation: spin90 2.5s ease-in-out infinite; }
  @keyframes spin90 {
    0%, 35% { transform: rotate(0deg); }
    65%, 100% { transform: rotate(90deg); }
  }
  #portraitWarn .wt { font-family: 'Fredoka One', cursive; font-size: 1.8rem; }
  #portraitWarn .ws { font-size: 0.95rem; opacity: 0.65; }
  @media (orientation: portrait) { #portraitWarn { display: flex; } }

  /* ── SCREENS ──────────────────────────────────── */
  .screen { position: fixed; inset: 0; display: none; }
  .screen.active {
    display: flex;
    align-items: center; justify-content: center;
    flex-direction: column;
  }
  /* game screen overrides to grid */
  #gameScreen {
    grid-template-columns: 1fr 200px 1fr;
    grid-template-rows: 1fr;
    gap: 0.5rem;
    padding: 0.5rem;
  }
  #gameScreen.active { display: grid !important; align-items: stretch; }

  /* ── BACK BUTTON ──────────────────────────────── */
  #backBtn {
    position: fixed; top: 0.7rem; left: 0.7rem; z-index: 500;
    font-family: 'Fredoka One', cursive; font-size: 0.9rem;
    text-decoration: none; color: var(--ink);
    background: white; border: 2.5px solid var(--ink); border-radius: 10px;
    padding: 0.28rem 0.75rem; box-shadow: 2px 2px 0 var(--ink);
    transition: transform 0.09s, box-shadow 0.09s;
    -webkit-tap-highlight-color: transparent;
  }
  #backBtn:active { transform: translate(2px,2px); box-shadow: 0 0 0 var(--ink); }
  .hidden { display: none !important; }

  /* ── SHARED BUTTONS ───────────────────────────── */
  .btn {
    font-family: 'Fredoka One', cursive; font-size: 1.1rem;
    padding: 0.55rem 1.3rem; border-radius: 14px;
    border: 3px solid var(--ink); cursor: pointer;
    box-shadow: 3px 3px 0 var(--ink); background: white; color: var(--ink);
    transition: transform 0.09s, box-shadow 0.09s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--ink); }
  .btn.sel {
    background: var(--ink); color: white;
    transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--ink);
  }
  .btn-go {
    background: var(--green); color: white;
    border-color: var(--green-dk); box-shadow: 3px 3px 0 var(--green-dk);
    font-size: 1.35rem; padding: 0.7rem 2.4rem;
  }
  .btn-go:active { box-shadow: 1px 1px 0 var(--green-dk); }
  .btn-sm {
    font-size: 0.88rem; padding: 0.35rem 0.8rem;
    box-shadow: 2px 2px 0 var(--ink); border-width: 2px;
  }

  /* ── MENU SCREEN ──────────────────────────────── */
  #menuScreen { background: var(--bg); gap: 1.4rem; }
  .menu-title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2.2rem, 6vw, 3.6rem);
    text-align: center; line-height: 1.1;
  }
  .menu-title .r { color: var(--red); }
  .menu-title .b { color: var(--blue); }
  .menu-sub { font-size: 0.95rem; color: var(--ink-lt); font-weight: 700; text-align: center; }
  .sec-lbl {
    font-family: 'Fredoka One', cursive; font-size: 0.88rem;
    color: var(--ink-lt); text-transform: uppercase;
    letter-spacing: 0.1em; text-align: center;
  }
  .btn-row { display: flex; gap: 0.7rem; justify-content: center; flex-wrap: wrap; }

  /* ── COUNTDOWN SCREEN ─────────────────────────── */
  #countdownScreen { background: var(--bg); }
  .cd-num {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(7rem, 22vw, 12rem);
    line-height: 1; color: var(--ink);
    animation: cdPop 0.35s cubic-bezier(.34,1.56,.64,1) both;
  }
  .cd-num.go { color: var(--green); }
  @keyframes cdPop {
    from { transform: scale(0.15); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }

  /* ── PLAYER PANELS ────────────────────────────── */
  .panel {
    border-radius: 18px; border: 3px solid;
    padding: 0.5rem 0.6rem;
    display: flex; flex-direction: column; align-items: center;
    gap: 0.35rem; overflow: hidden;
  }
  .panel.p1 { background: var(--red-bg);  border-color: var(--red); }
  .panel.p2 { background: var(--blue-bg); border-color: var(--blue); }

  .p-label {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(0.88rem, 2vw, 1.2rem);
    display: flex; align-items: center; gap: 0.3rem; white-space: nowrap;
  }
  .panel.p1 .p-label { color: var(--red); }
  .panel.p2 .p-label { color: var(--blue); }

  .q-box {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    color: var(--ink); text-align: center; min-height: 1.2em;
    transition: color 0.12s;
  }
  .q-box.ok  { color: var(--green); }
  .q-box.err { color: var(--red); }

  .ans-box {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.8rem, 4.5vw, 2.9rem);
    width: 3.8rem; min-height: 2.8rem;
    border-radius: 12px; border: 3px solid;
    display: flex; align-items: center; justify-content: center;
    background: white; line-height: 1;
    transition: background 0.12s;
  }
  .panel.p1 .ans-box { border-color: var(--red);  color: var(--red); }
  .panel.p2 .ans-box { border-color: var(--blue); color: var(--blue); }
  .ans-box.ok  { background: #d4ffdc !important; }
  .ans-box.err { background: #ffd4d4 !important; }

  /* ── NUMPAD ───────────────────────────────────── */
  .np-wrap {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    width: 100%;
  }
  .numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: clamp(0.2rem, 0.5vw, 0.4rem);
    width: 100%; max-width: 210px;
  }
  .nk {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(0.9rem, 2.2vw, 1.4rem);
    border-radius: 10px; border: 2.5px solid;
    background: white; cursor: pointer;
    aspect-ratio: 1.15;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.07s, background 0.07s;
    -webkit-tap-highlight-color: transparent;
  }
  .nk:active { transform: scale(0.87); }
  .panel.p1 .nk { border-color: var(--red);  color: var(--red); }
  .panel.p2 .nk { border-color: var(--blue); color: var(--blue); }
  .panel.p1 .nk:active { background: #ffe0e0; }
  .panel.p2 .nk:active { background: #dde6ff; }

  /* ── AI AREA ──────────────────────────────────── */
  .ai-area {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0.7rem; width: 100%;
  }
  .ai-lbl { font-family: 'Fredoka One', cursive; font-size: 1rem; color: var(--blue); }
  .ai-bar  { width: 80%; height: 10px; background: #ccd4ff; border-radius: 5px; overflow: hidden; }
  .ai-fill { height: 100%; background: var(--blue); border-radius: 5px; width: 0%; }

  /* ── CENTER COLUMN ────────────────────────────── */
  .ctr {
    display: flex; flex-direction: column;
    align-items: center; justify-content: space-between;
    padding: 0.4rem 0; gap: 0.3rem;
  }
  .vs-lbl {
    font-family: 'Fredoka One', cursive; font-size: 0.95rem;
    color: var(--ink-lt); text-align: center;
  }

  /* Rope */
  .rope-wrap {
    position: relative; width: 100%; height: 66px;
    display: flex; align-items: center;
  }
  .rope-track {
    position: absolute; left: 0; right: 0; height: 14px;
    background: repeating-linear-gradient(
      90deg,
      #c9972a 0, #c9972a 8px,
      #8b5e0c 8px, #8b5e0c 16px
    );
    border-radius: 7px; border: 2px solid #7a4f08;
    top: 50%; transform: translateY(-50%);
  }
  .rope-end-r {
    position: absolute; left: 0; width: 18%; height: 14px;
    background: rgba(212,40,40,0.35); border-radius: 7px 0 0 7px;
    top: 50%; transform: translateY(-50%);
  }
  .rope-end-b {
    position: absolute; right: 0; width: 18%; height: 14px;
    background: rgba(32,80,212,0.35); border-radius: 0 7px 7px 0;
    top: 50%; transform: translateY(-50%);
  }
  .rope-tick {
    position: absolute; width: 3px; height: 26px;
    background: rgba(0,0,0,0.16); border-radius: 2px;
    top: 50%; transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .rope-knot {
    position: absolute; width: 34px; height: 34px;
    background: white; border: 3px solid var(--ink); border-radius: 50%;
    top: 50%; transform: translate(-50%, -50%);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.05rem;
    transition: left 0.4s cubic-bezier(.34,1.56,.64,1);
    z-index: 5; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  @keyframes knotPop {
    0%,100% { transform: translate(-50%,-50%) scale(1); }
    45%     { transform: translate(-50%,-50%) scale(1.3); }
  }
  .rope-knot.pop { animation: knotPop 0.38s ease; }

  /* Score dots */
  .score-row {
    display: flex; align-items: center;
    gap: 0.25rem; flex-wrap: wrap; justify-content: center;
  }
  .sd {
    width: 11px; height: 11px; border-radius: 50%;
    background: #d8d8e8; border: 2px solid #b8b8cc;
    transition: background 0.22s, border-color 0.22s;
  }
  .sd.r { background: var(--red);  border-color: #a01818; }
  .sd.b { background: var(--blue); border-color: #1430a0; }

  .score-txt {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(0.68rem, 1.4vw, 0.85rem);
    color: var(--ink-lt); text-align: center;
  }
  .quit-lnk {
    font-size: 0.72rem; font-weight: 700;
    color: var(--ink-lt); cursor: pointer;
    text-decoration: underline; opacity: 0.55;
    -webkit-tap-highlight-color: transparent;
  }
  .quit-lnk:hover { opacity: 1; }

  /* ── WIN SCREEN ───────────────────────────────── */
  #winScreen { background: var(--bg); gap: 1.1rem; }
  #confettiCanvas { position: fixed; inset: 0; pointer-events: none; z-index: 50; }
  .win-banner {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2.8rem, 9vw, 5rem);
    text-align: center; line-height: 1.1;
    animation: wbounce 0.5s cubic-bezier(.34,1.56,.64,1) both;
    position: relative; z-index: 100;
  }
  @keyframes wbounce {
    from { transform: scale(0.2) rotate(-8deg); opacity: 0; }
    to   { transform: scale(1)   rotate(0deg);  opacity: 1; }
  }
  .win-banner.r { color: var(--red); }
  .win-banner.b { color: var(--blue); }
  .win-sub {
    font-size: 1.05rem; color: var(--ink-lt); font-weight: 700;
    text-align: center; position: relative; z-index: 100;
  }
  .win-btns {
    display: flex; gap: 0.75rem; flex-wrap: wrap;
    justify-content: center; position: relative; z-index: 100;
  }

  /* ── RESPONSIVE SMALL SCREENS ─────────────────── */
  @media (max-height: 460px) {
    #gameScreen { gap: 0.3rem; padding: 0.3rem; }
    .panel { padding: 0.3rem 0.4rem; gap: 0.2rem; }
    .q-box   { font-size: 1.4rem; }
    .ans-box { font-size: 1.6rem; min-height: 2.2rem; width: 3rem; }
    .rope-wrap  { height: 50px; }
    .rope-knot  { width: 26px; height: 26px; font-size: 0.82rem; }
    .rope-tick  { height: 20px; }
  }
  @media (max-width: 600px) and (orientation: landscape) {
    #gameScreen { grid-template-columns: 1fr 160px 1fr; }
  }
</style>
</head>
<body>

<!-- Portrait warning -->
<div id="portraitWarn">
  <div class="wi">📱</div>
  <div class="wt">Please rotate your device!</div>
  <div class="ws">Tug of War needs landscape mode.</div>
</div>

<!-- Back to Dashboard -->
<a href="../" id="backBtn">← Back</a>

<!-- ═══════════════════════════════════════════════
     MENU
════════════════════════════════════════════════ -->
<div class="screen active" id="menuScreen">
  <div class="menu-title">
    <span class="r">Tug</span> of <span class="b">War</span> Math 🪢
  </div>
  <div class="menu-sub">Answer faster — pull harder!</div>

  <div class="sec-lbl">Mode</div>
  <div class="btn-row">
    <button class="btn sel" id="btnAI" onclick="pickMode('ai')">🤖 vs AI</button>
    <button class="btn"     id="btn2P" onclick="pickMode('2p')">👥 2 Players</button>
  </div>

  <div id="diffBlock">
    <div class="sec-lbl" style="margin-bottom:0.5rem;">Difficulty</div>
    <div class="btn-row">
      <button class="btn sel" id="btnEasy" onclick="pickDiff('easy')">😊 Easy</button>
      <button class="btn"     id="btnMed"  onclick="pickDiff('medium')">😤 Medium</button>
      <button class="btn"     id="btnHard" onclick="pickDiff('hard')">🔥 Hard</button>
    </div>
  </div>

  <button class="btn btn-go" onclick="startCountdown()">🪢 Start!</button>
</div>

<!-- ═══════════════════════════════════════════════
     COUNTDOWN
════════════════════════════════════════════════ -->
<div class="screen" id="countdownScreen">
  <div class="cd-num" id="cdNum">3</div>
</div>

<!-- ═══════════════════════════════════════════════
     GAME
════════════════════════════════════════════════ -->
<div class="screen" id="gameScreen">

  <!-- Player 1 (red / left) -->
  <div class="panel p1">
    <div class="p-label">🔴 <span id="p1name">Player 1</span></div>
    <div class="q-box"  id="q1">—</div>
    <div class="ans-box" id="a1">_</div>
    <div class="np-wrap" id="np1"></div>
  </div>

  <!-- Center rope column -->
  <div class="ctr">
    <div class="vs-lbl" id="vsLbl">You vs AI</div>

    <div class="rope-wrap" id="ropeWrap">
      <div class="rope-track"></div>
      <div class="rope-end-r"></div>
      <div class="rope-end-b"></div>
      <!-- tick marks injected by JS -->
      <div class="rope-knot" id="knot">🪢</div>
    </div>

    <div class="score-row" id="scoreDots"></div>
    <div class="score-txt"  id="scoreTxt">First to 5 wins!</div>
    <div class="quit-lnk"  onclick="quitGame()">✕ quit</div>
  </div>

  <!-- Player 2 / AI (blue / right) -->
  <div class="panel p2">
    <div class="p-label">🔵 <span id="p2name">AI</span></div>
    <div class="q-box"  id="q2">—</div>
    <div class="ans-box" id="a2">_</div>
    <div class="np-wrap" id="np2"></div>
  </div>

</div>

<!-- ═══════════════════════════════════════════════
     WIN
════════════════════════════════════════════════ -->
<div class="screen" id="winScreen">
  <canvas id="confettiCanvas"></canvas>
  <div class="win-banner r" id="winBanner">🏆 You Win!</div>
  <div class="win-sub"       id="winSub">You out-multiplied the AI!</div>
  <div class="win-btns" style="margin-top:0.6rem;">
    <button class="btn btn-go" onclick="startCountdown()">🔄 Play Again</button>
    <button class="btn btn-sm" onclick="goMenu()">📋 Menu</button>
  </div>
</div>

<script>
// ── CONFIG ─────────────────────────────────────────────────────
const WIN = 5;   // first to pull rope this many spots wins

// ── STATE ──────────────────────────────────────────────────────
let mode = 'ai', diff = 'easy';
let rope = 0;            // -WIN..+WIN  (negative = P1 winning)
let inp1 = '', inp2 = '';
let q1 = null, q2 = null;
let live = false;
let aiTimer = null;

// ── SCREEN HELPER ──────────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('backBtn')
    .classList.toggle('hidden', id === 'gameScreen');
}
function goMenu() {
  live = false;
  clearTimeout(aiTimer);
  document.removeEventListener('keydown', onKey);
  show('menuScreen');
}
function quitGame() { goMenu(); }

// ── MENU ───────────────────────────────────────────────────────
function pickMode(m) {
  mode = m;
  document.getElementById('btnAI').classList.toggle('sel', m === 'ai');
  document.getElementById('btn2P').classList.toggle('sel', m === '2p');
  const db = document.getElementById('diffBlock');
  db.style.opacity = m === 'ai' ? '1' : '0.4';
  db.style.pointerEvents = m === 'ai' ? '' : 'none';
}
function pickDiff(d) {
  diff = d;
  ['easy','medium','hard'].forEach(x => {
    const id = 'btn' + x[0].toUpperCase() + x.slice(1);
    document.getElementById(id).classList.toggle('sel', x === d);
  });
}

// ── QUESTION GENERATOR ─────────────────────────────────────────
// Only produces questions whose answer is a 2-digit number (10–99).
function makeQ(d) {
  const ranges = { easy: [2,7], medium: [2,9], hard: [3,12] };
  const [lo, hi] = ranges[d] || [2, 9];
  let a, b, tries = 0;
  do {
    a = lo + Math.floor(Math.random() * (hi - lo + 1));
    b = lo + Math.floor(Math.random() * (hi - lo + 1));
    tries++;
  } while ((a * b < 10 || a * b > 99) && tries < 500);
  if (Math.random() < 0.5) [a, b] = [b, a];
  return { a, b, ans: a * b };
}

// ── NUMPAD BUILDER ─────────────────────────────────────────────
function buildPad(p) {
  const grid = document.createElement('div');
  grid.className = 'numpad';
  [1,2,3,4,5,6,7,8,9,'⌫',0,''].forEach(k => {
    const btn = document.createElement('button');
    btn.className = 'nk';
    btn.textContent = k === '' ? '' : k;
    if (k === '') { btn.style.visibility = 'hidden'; btn.disabled = true; return grid.appendChild(btn); }
    const fire = () => {
      if (!live) return;
      k === '⌫' ? delInp(p) : addInp(p, String(k));
    };
    btn.addEventListener('touchstart', e => { e.preventDefault(); fire(); }, { passive: false });
    btn.addEventListener('mousedown',  e => { e.preventDefault(); fire(); });
    grid.appendChild(btn);
  });
  return grid;
}

// ── INPUT ──────────────────────────────────────────────────────
function addInp(p, d) {
  if (p === 1) {
    if (inp1.length >= 2) return;
    inp1 += d; setAns(1, inp1);
    if (inp1.length === 2) checkAns(1);
  } else {
    if (inp2.length >= 2) return;
    inp2 += d; setAns(2, inp2);
    if (inp2.length === 2) checkAns(2);
  }
}
function delInp(p) {
  if (p === 1 && inp1.length) { inp1 = inp1.slice(0,-1); setAns(1, inp1); }
  if (p === 2 && inp2.length) { inp2 = inp2.slice(0,-1); setAns(2, inp2); }
}
function setAns(p, v) {
  document.getElementById('a' + p).textContent = v || '_';
}

// ── ANSWER CHECK ───────────────────────────────────────────────
function checkAns(p) {
  const inp = p === 1 ? inp1 : inp2;
  const q   = p === 1 ? q1   : q2;
  const aEl = document.getElementById('a' + p);
  const qEl = document.getElementById('q' + p);

  if (parseInt(inp) === q.ans) {
    // ✓ Correct
    aEl.classList.add('ok'); qEl.classList.add('ok');
    if (p === 1) inp1 = ''; else inp2 = '';
    setTimeout(() => {
      aEl.classList.remove('ok'); qEl.classList.remove('ok');
      pull(p);
    }, 220);
  } else {
    // ✗ Wrong — flash red, then clear and stay on same question
    aEl.classList.add('err'); qEl.classList.add('err');
    if (p === 1) inp1 = ''; else inp2 = '';
    setTimeout(() => {
      aEl.classList.remove('err'); qEl.classList.remove('err');
      setAns(p, '');
    }, 380);
  }
}

// ── ROPE PULL ──────────────────────────────────────────────────
// P1 correct → rope goes negative (knot toward P1 / left)
// P2 correct → rope goes positive (knot toward P2 / right)
function pull(p) {
  if (!live) return;
  rope += (p === 1 ? -1 : 1);
  updateRope();
  if (rope <= -WIN) { endGame(1); return; }
  if (rope >=  WIN) { endGame(2); return; }
  nextQ(p);
}

function updateRope() {
  // Knot position: 5% (P1 wins) ↔ 95% (P2 wins), center = 50%
  const knot = document.getElementById('knot');
  knot.style.left = (50 + (rope / WIN) * 45) + '%';
  knot.classList.remove('pop');
  void knot.offsetWidth;  // reflow to restart animation
  knot.classList.add('pop');

  // Score dots: 9 dots for WIN=5 (-4…+4)
  // Dots on P1's side (i < 0) fill RED  when knot has passed them (rope ≤ i)
  // Dots on P2's side (i > 0) fill BLUE when knot has passed them (rope ≥ i)
  const dc = document.getElementById('scoreDots');
  dc.innerHTML = '';
  for (let i = -(WIN-1); i <= WIN-1; i++) {
    const dot = document.createElement('div');
    dot.className = 'sd' +
      (i < 0 && rope <= i ? ' r' :
       i > 0 && rope >= i ? ' b' : '');
    dc.appendChild(dot);
  }

  document.getElementById('scoreTxt').textContent =
    rope === 0  ? 'Dead even!' :
    rope  <  0  ? `🔴 Red leads ${Math.abs(rope)}-0` :
                  `🔵 Blue leads ${rope}-0`;
}

// ── NEXT QUESTION ──────────────────────────────────────────────
function nextQ(p) {
  if (!live) return;
  const q = makeQ(diff);
  if (p === 1) {
    q1 = q; inp1 = '';
    document.getElementById('q1').textContent = `${q.a} × ${q.b} = ?`;
    setAns(1, '');
  } else {
    q2 = q; inp2 = '';
    if (mode === 'ai') {
      document.getElementById('q2').textContent = '? × ? = ?';
      setAns(2, '');
      scheduleAI();
    } else {
      document.getElementById('q2').textContent = `${q.a} × ${q.b} = ?`;
      setAns(2, '');
    }
  }
}

// ── AI OPPONENT ────────────────────────────────────────────────
function scheduleAI() {
  clearTimeout(aiTimer);
  const delay = {
    easy:   3800 + Math.random() * 2800,
    medium: 1600 + Math.random() * 1800,
    hard:    500 + Math.random() * 1000
  }[diff];

  // Animate progress bar
  const fill = document.querySelector('.ai-fill');
  if (fill) {
    fill.style.transition = 'none'; fill.style.width = '0%';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      fill.style.transition = `width ${delay}ms linear`;
      fill.style.width = '100%';
    }));
  }

  aiTimer = setTimeout(() => {
    if (!live) return;
    // Briefly reveal question + answer, then pull
    document.getElementById('q2').textContent = `${q2.a} × ${q2.b} = ?`;
    setAns(2, String(q2.ans));
    const aEl = document.getElementById('a2');
    aEl.classList.add('ok');
    setTimeout(() => {
      aEl.classList.remove('ok');
      inp2 = ''; setAns(2, '');
      pull(2);
    }, 220);
  }, delay);
}

// ── COUNTDOWN ──────────────────────────────────────────────────
function startCountdown() {
  show('countdownScreen');
  const el = document.getElementById('cdNum');
  let i = 0;
  const seq = ['3', '2', '1', 'GO!'];
  (function tick() {
    el.textContent = seq[i];
    el.className = 'cd-num' + (seq[i] === 'GO!' ? ' go' : '');
    el.style.animation = 'none'; void el.offsetWidth; el.style.animation = '';
    i++;
    if (i < seq.length) setTimeout(tick, 700);
    else setTimeout(startGame, 450);
  })();
}

// ── START GAME ─────────────────────────────────────────────────
function startGame() {
  rope = 0; inp1 = ''; inp2 = ''; live = true;
  clearTimeout(aiTimer);

  // Labels
  document.getElementById('p1name').textContent = 'Player 1';
  document.getElementById('p2name').textContent = mode === 'ai' ? 'AI' : 'Player 2';
  document.getElementById('vsLbl').textContent  = mode === 'ai' ? 'You vs AI' : 'P1 vs P2';

  // P1 numpad
  const np1 = document.getElementById('np1');
  np1.innerHTML = ''; np1.appendChild(buildPad(1));

  // P2 area
  const np2 = document.getElementById('np2');
  np2.innerHTML = '';
  if (mode === '2p') {
    np2.appendChild(buildPad(2));
  } else {
    np2.innerHTML = `
      <div class="ai-area">
        <div class="ai-lbl">🤖 Thinking…</div>
        <div class="ai-bar"><div class="ai-fill"></div></div>
      </div>`;
  }

  // Rope tick marks (positions -(WIN-1) to +(WIN-1))
  const rw = document.getElementById('ropeWrap');
  rw.querySelectorAll('.rope-tick').forEach(t => t.remove());
  for (let i = -(WIN-1); i <= WIN-1; i++) {
    const t = document.createElement('div');
    t.className = 'rope-tick';
    t.style.left = (50 + (i / WIN) * 45) + '%';
    rw.appendChild(t);
  }

  // Reset knot (no transition for instant snap to center)
  const knot = document.getElementById('knot');
  knot.style.transition = 'none'; knot.style.left = '50%';
  setTimeout(() => { knot.style.transition = 'left 0.4s cubic-bezier(.34,1.56,.64,1)'; }, 30);

  // Draw initial rope state
  updateRope();

  // First questions
  q1 = makeQ(diff); q2 = makeQ(diff);
  document.getElementById('q1').textContent = `${q1.a} × ${q1.b} = ?`;
  setAns(1, '');
  if (mode === '2p') {
    document.getElementById('q2').textContent = `${q2.a} × ${q2.b} = ?`;
    setAns(2, '');
  } else {
    document.getElementById('q2').textContent = '? × ? = ?';
    setAns(2, '');
    scheduleAI();
  }

  show('gameScreen');

  document.removeEventListener('keydown', onKey);
  document.addEventListener('keydown', onKey);
}

// Number keys / backspace control P1 (useful on desktop/keyboard testing)
function onKey(e) {
  if (!live) return;
  if (e.key >= '0' && e.key <= '9') addInp(1, e.key);
  else if (e.key === 'Backspace') delInp(1);
}

// ── END GAME ───────────────────────────────────────────────────
function endGame(winner) {
  live = false;
  clearTimeout(aiTimer);
  document.removeEventListener('keydown', onKey);

  const p1wins = winner === 1;
  document.getElementById('winBanner').textContent =
    p1wins ? (mode === 'ai' ? '🏆 You Win!'   : '🏆 Red Wins!')
           : (mode === 'ai' ? '🤖 AI Wins!'   : '🏆 Blue Wins!');
  document.getElementById('winBanner').className = 'win-banner ' + (p1wins ? 'r' : 'b');
  document.getElementById('winSub').textContent =
    p1wins ? (mode === 'ai' ? 'You out-multiplied the AI! 🎉' : 'Red team pulls through! 🎉')
           : (mode === 'ai' ? 'The AI was faster this time…'  : 'Blue team dominates! 🎉');

  show('winScreen');
  launchConfetti(p1wins ? '#d42828' : '#2050d4');
}

// ── CONFETTI ───────────────────────────────────────────────────
function launchConfetti(mainCol) {
  const cv = document.getElementById('confettiCanvas');
  cv.width = window.innerWidth; cv.height = window.innerHeight;
  const ctx = cv.getContext('2d');
  const palette = [mainCol, '#f7c948', '#4caf50', '#ff9800', '#e91e63', '#9c27b0'];
  const ps = Array.from({ length: 120 }, () => ({
    x:   Math.random() * cv.width,
    y:  -30 - Math.random() * 160,
    vx:  (Math.random() - 0.5) * 4,
    vy:  2 + Math.random() * 3.5,
    w:   7 + Math.random() * 8,
    h:   4 + Math.random() * 5,
    rot: Math.random() * Math.PI * 2,
    vr:  (Math.random() - 0.5) * 0.13,
    c:   palette[Math.floor(Math.random() * palette.length)],
    a:   1
  }));
  let raf;
  (function draw() {
    ctx.clearRect(0, 0, cv.width, cv.height);
    let alive = false;
    ps.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.07; p.rot += p.vr;
      if (p.y > cv.height) p.a -= 0.025;
      if (p.a > 0) alive = true;
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.a);
      ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.c;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    });
    if (alive) raf = requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, cv.width, cv.height);
  })();
}

// ── INIT ───────────────────────────────────────────────────────
pickMode('ai');
pickDiff('easy');
