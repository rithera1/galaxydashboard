<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tug × Battle</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --red:      #d42828;
    --red-bg:   #fff0f0;
    --blue:     #2050d4;
    --blue-bg:  #f0f4ff;
    --bg:       #eef0fb;
    --ink:      #1a1a2e;
    --ink-lt:   #555577;
    --green:    #4caf50;
    --green-dk: #2e7d32;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--ink);
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── PORTRAIT WARNING ─────────────────────────── */
  #portraitWarn {
    display: none;
    position: fixed; inset: 0; z-index: 9999;
    background: #1a1a2e; color: white;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 1.2rem;
    text-align: center; padding: 2rem;
  }
  #portraitWarn .wi { font-size: 5rem; animation: spin90 2.5s ease-in-out infinite; }
  @keyframes spin90 {
    0%, 35% { transform: rotate(0deg); }
    65%, 100% { transform: rotate(90deg); }
  }
  #portraitWarn .wt { font-family: 'Fredoka One', cursive; font-size: 1.8rem; }
  #portraitWarn .ws { font-size: 0.95rem; opacity: 0.65; }
  @media (orientation: portrait) { #portraitWarn { display: flex; } }

  /* ── SCREENS ──────────────────────────────────── */
  .screen { position: fixed; inset: 0; display: none; }
  .screen.active {
    display: flex;
    align-items: center; justify-content: center;
    flex-direction: column;
  }
  /* Panels are fixed; middle gets the rest */
  #gameScreen {
    grid-template-columns: 175px 1fr 175px;
    grid-template-rows: 1fr;
    gap: 0.5rem;
    padding: 0.5rem;
  }
  #gameScreen.active { display: grid !important; align-items: stretch; }

  /* ── BACK BUTTON ──────────────────────────────── */
  #backBtn {
    position: fixed; top: 0.7rem; left: 0.7rem; z-index: 500;
    font-family: 'Fredoka One', cursive; font-size: 0.9rem;
    text-decoration: none; color: var(--ink);
    background: white; border: 2.5px solid var(--ink); border-radius: 10px;
    padding: 0.28rem 0.75rem; box-shadow: 2px 2px 0 var(--ink);
    transition: transform 0.09s, box-shadow 0.09s;
    -webkit-tap-highlight-color: transparent;
  }
  #backBtn:active { transform: translate(2px,2px); box-shadow: 0 0 0 var(--ink); }
  .hidden { display: none !important; }

  /* ── SHARED BUTTONS ───────────────────────────── */
  .btn {
    font-family: 'Fredoka One', cursive; font-size: 1.1rem;
    padding: 0.55rem 1.3rem; border-radius: 14px;
    border: 3px solid var(--ink); cursor: pointer;
    box-shadow: 3px 3px 0 var(--ink); background: white; color: var(--ink);
    transition: transform 0.09s, box-shadow 0.09s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--ink); }
  .btn.sel {
    background: var(--ink); color: white;
    transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--ink);
  }
  .btn-go {
    background: var(--green); color: white;
    border-color: var(--green-dk); box-shadow: 3px 3px 0 var(--green-dk);
    font-size: 1.35rem; padding: 0.7rem 2.4rem;
  }
  .btn-go:active { box-shadow: 1px 1px 0 var(--green-dk); }
  .btn-sm {
    font-size: 0.88rem; padding: 0.35rem 0.8rem;
    box-shadow: 2px 2px 0 var(--ink); border-width: 2px;
  }

  /* ── MENU SCREEN ──────────────────────────────── */
  #menuScreen { background: var(--bg); gap: 1.4rem; }
  .menu-title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2.2rem, 6vw, 3.6rem);
    text-align: center; line-height: 1.1;
  }
  .menu-title .r { color: var(--red); }
  .menu-title .b { color: var(--blue); }
  .menu-title .x { color: var(--ink); opacity: 0.55; font-size: 0.75em; vertical-align: middle; }
  .menu-sub { font-size: 0.95rem; color: var(--ink-lt); font-weight: 700; text-align: center; }
  .sec-lbl {
    font-family: 'Fredoka One', cursive; font-size: 0.88rem;
    color: var(--ink-lt); text-transform: uppercase;
    letter-spacing: 0.1em; text-align: center;
  }
  .btn-row { display: flex; gap: 0.7rem; justify-content: center; flex-wrap: wrap; }

  /* ── COUNTDOWN SCREEN ─────────────────────────── */
  #countdownScreen { background: var(--bg); }
  .cd-num {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(7rem, 22vw, 12rem);
    line-height: 1; color: var(--ink);
    animation: cdPop 0.35s cubic-bezier(.34,1.56,.64,1) both;
  }
  .cd-num.go { color: var(--green); }
  @keyframes cdPop {
    from { transform: scale(0.15); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }

  /* ── PLAYER PANELS ────────────────────────────── */
  .panel {
    border-radius: 18px; border: 3px solid;
    padding: 0.5rem 0.5rem;
    display: flex; flex-direction: column; align-items: center;
    gap: 0.35rem; overflow: visible;
  }
  .panel.p1 { background: var(--red-bg);  border-color: var(--red); }
  .panel.p2 { background: var(--blue-bg); border-color: var(--blue); }

  @keyframes panelOk {
    0%,100% { box-shadow: 0 0 0 0 transparent; }
    30%     { box-shadow: 0 0 0 6px var(--green), 0 0 28px rgba(76,175,80,0.6); }
    70%     { box-shadow: 0 0 0 4px var(--green), 0 0 16px rgba(76,175,80,0.3); }
  }
  @keyframes panelErr {
    0%,100%  { box-shadow: 0 0 0 0 transparent; }
    20%, 60% { box-shadow: 0 0 0 6px var(--red), 0 0 28px rgba(212,40,40,0.6); }
    40%      { box-shadow: 0 0 0 3px var(--red), 0 0 14px rgba(212,40,40,0.3); }
  }
  .panel.flash-ok  { animation: panelOk  0.48s ease; }
  .panel.flash-err { animation: panelErr 0.48s ease; }

  .p-label {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(0.8rem, 1.8vw, 1.1rem);
    display: flex; align-items: center; gap: 0.3rem; white-space: nowrap;
  }
  .panel.p1 .p-label { color: var(--red); }
  .panel.p2 .p-label { color: var(--blue); }

  .q-box {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.4rem, 3.5vw, 2.4rem);
    color: var(--ink); text-align: center; min-height: 1.2em;
    transition: color 0.1s;
  }
  .q-box.ok  { color: var(--green); }
  .q-box.err { color: var(--red); }

  /* ── ANSWER BOX ───────────────────────────────── */
  .ans-box {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 4.8vw, 3.2rem);
    width: 5.6rem; min-height: 3.8rem;
    border-radius: 14px; border: 3px solid;
    display: flex; align-items: center; justify-content: center;
    background: white; line-height: 1;
  }
  .panel.p1 .ans-box { border-color: var(--red);  color: var(--red); }
  .panel.p2 .ans-box { border-color: var(--blue); color: var(--blue); }

  @keyframes ansOk {
    0%   { transform: scale(1); }
    35%  { transform: scale(1.32); }
    65%  { transform: scale(0.92); }
    100% { transform: scale(1); }
  }
  @keyframes ansErr {
    0%,100% { transform: translateX(0); }
    15%     { transform: translateX(-10px); }
    30%     { transform: translateX(10px); }
    45%     { transform: translateX(-7px); }
    60%     { transform: translateX(7px); }
    78%     { transform: translateX(-3px); }
    90%     { transform: translateX(3px); }
  }
  .ans-box.ok  { background: #c6ffd0 !important; animation: ansOk  0.38s ease; }
  .ans-box.err { background: #ffc6c6 !important; animation: ansErr 0.44s ease; }

  /* ── NUMPAD ───────────────────────────────────── */
  .np-wrap {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    width: 100%;
  }
  .numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: clamp(0.18rem, 0.45vw, 0.38rem);
    width: 100%; max-width: 210px;
  }
  .nk {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(0.88rem, 2.1vw, 1.35rem);
    border-radius: 10px; border: 2.5px solid;
    background: white; cursor: pointer;
    aspect-ratio: 1.15;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.07s, background 0.07s;
    -webkit-tap-highlight-color: transparent;
  }
  .nk:active { transform: scale(0.87); }
  .panel.p1 .nk { border-color: var(--red);  color: var(--red); }
  .panel.p2 .nk { border-color: var(--blue); color: var(--blue); }
  .panel.p1 .nk:active { background: #ffe0e0; }
  .panel.p2 .nk:active { background: #dde6ff; }

  /* ── AI AREA ──────────────────────────────────── */
  .ai-area {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0.7rem; width: 100%;
  }
  .ai-lbl { font-family: 'Fredoka One', cursive; font-size: 1rem; color: var(--blue); }
  .ai-bar  { width: 80%; height: 10px; background: #ccd4ff; border-radius: 5px; overflow: hidden; }
  .ai-fill { height: 100%; background: var(--blue); border-radius: 5px; width: 0%; }

  /* ── CENTER COLUMN ────────────────────────────── */
  .ctr {
    display: flex; flex-direction: column;
    align-items: center; justify-content: space-between;
    padding: 0.4rem 0; gap: 0.25rem;
  }
  .vs-lbl {
    font-family: 'Fredoka One', cursive; font-size: 0.95rem;
    color: var(--ink-lt); text-align: center;
  }

  /* ── TUG SCENE SVG container ─────────────────── */
  .tug-scene {
    flex: 1;
    width: 100%;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: visible;
  }
  #tugSVG {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  /* ── FLAG ANIMATIONS ─────────────────────────── */
  /* Spring slide transition on the whole flag group */
  #tugFlag {
    transition: transform 0.42s cubic-bezier(.34,1.56,.64,1);
  }
  /* Pennant waving continuously */
  #flagPennant {
    transform-box: fill-box;
    transform-origin: 0% 50%;
    animation: flagWave 1.1s ease-in-out infinite;
  }
  @keyframes flagWave {
    0%, 100% { transform: scaleX(1)    skewY(0deg); }
    30%       { transform: scaleX(1.06) skewY(-5deg); }
    70%       { transform: scaleX(0.96) skewY(3deg); }
  }
  /* Pop burst on each point scored */
  #tugFlag.flag-pop #flagPennant {
    animation: flagPop 0.48s cubic-bezier(.34,1.56,.64,1) !important;
  }
  @keyframes flagPop {
    0%   { transform: scaleX(1)    scaleY(1); }
    30%  { transform: scaleX(1.5)  scaleY(0.65); }
    60%  { transform: scaleX(0.82) scaleY(1.28); }
    100% { transform: scaleX(1)    scaleY(1); }
  }

  /* ── SCORE DOTS ───────────────────────────────── */
  .score-row {
    display: flex; align-items: center;
    gap: 0.25rem; flex-wrap: wrap; justify-content: center;
  }
  .sd {
    width: 11px; height: 11px; border-radius: 50%;
    background: #d8d8e8; border: 2px solid #b8b8cc;
    transition: background 0.22s, border-color 0.22s;
  }
  .sd.r { background: var(--red);  border-color: #a01818; }
  .sd.b { background: var(--blue); border-color: #1430a0; }
  .score-txt {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(0.68rem, 1.4vw, 0.85rem);
    color: var(--ink-lt); text-align: center;
  }

  /* ── STATS HUD ────────────────────────────────── */
  .hud-strip {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; padding: 0.18rem 0.4rem;
    background: rgba(255,255,255,0.65); border-radius: 10px;
    border: 1.5px solid #d0d0e8; gap: 0.2rem;
  }
  .hud-p {
    display: flex; flex-direction: column; align-items: center;
    gap: 0.06rem; flex: 1;
  }
  .hud-name {
    font-family: 'Fredoka One', cursive; font-size: 0.6rem; opacity: 0.8;
  }
  .hud-p1 .hud-name { color: var(--red); }
  .hud-p2 .hud-name { color: var(--blue); }
  .hud-row { display: flex; gap: 0.28rem; font-size: 0.68rem; font-weight: 800; align-items: center; }
  .hc-r { color: #2e7d32; }
  .hc-w { color: #c62828; }
  .hc-b { color: #6d4c41; font-size: 0.61rem; font-weight: 700; }
  .hud-clock {
    font-family: 'Fredoka One', cursive; font-size: 0.92rem;
    color: var(--ink); text-align: center; white-space: nowrap; padding: 0 0.25rem;
  }

  .quit-lnk {
    font-size: 0.72rem; font-weight: 700;
    color: var(--ink-lt); cursor: pointer;
    text-decoration: underline; opacity: 0.55;
    -webkit-tap-highlight-color: transparent;
  }
  .quit-lnk:hover { opacity: 1; }

  /* ── WIN SCREEN ───────────────────────────────── */
  #winScreen { background: var(--bg); gap: 1.1rem; }
  #confettiCanvas { position: fixed; inset: 0; pointer-events: none; z-index: 50; }
  .win-banner {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2.8rem, 9vw, 5rem);
    text-align: center; line-height: 1.1;
    animation: wbounce 0.5s cubic-bezier(.34,1.56,.64,1) both;
    position: relative; z-index: 100;
  }
  @keyframes wbounce {
    from { transform: scale(0.2) rotate(-8deg); opacity: 0; }
    to   { transform: scale(1)   rotate(0deg);  opacity: 1; }
  }
  .win-banner.r { color: var(--red); }
  .win-banner.b { color: var(--blue); }
  .win-sub {
    font-size: 1.05rem; color: var(--ink-lt); font-weight: 700;
    text-align: center; position: relative; z-index: 100;
  }
  .win-btns {
    display: flex; gap: 0.75rem; flex-wrap: wrap;
    justify-content: center; position: relative; z-index: 100;
  }

  /* ── RESPONSIVE ───────────────────────────────── */
  @media (max-height: 460px) {
    #gameScreen { gap: 0.3rem; padding: 0.3rem; }
    .panel { padding: 0.3rem 0.4rem; gap: 0.2rem; }
    .q-box   { font-size: 1.4rem; }
    .ans-box { font-size: 1.6rem; min-height: 2.6rem; width: 4rem; }
    .tug-scene { min-height: 55px; }
  }
  @media (max-width: 600px) and (orientation: landscape) {
    #gameScreen { grid-template-columns: 145px 1fr 145px; }
  }
</style>
</head>
<body>

<!-- Portrait warning -->
<div id="portraitWarn">
  <div class="wi">📱</div>
  <div class="wt">Please rotate your device!</div>
  <div class="ws">Tug × Battle needs landscape mode.</div>
</div>

<a href="../" id="backBtn">← Back</a>

<!-- ═══════════════════════════════════════════════
     MENU
════════════════════════════════════════════════ -->
<div class="screen active" id="menuScreen">
  <div class="menu-title">
    <span class="r">Tug</span><span class="x"> × </span><span class="b">Battle</span>
  </div>
  <div class="menu-sub">Multiply faster — pull harder!</div>

  <div class="sec-lbl">Mode</div>
  <div class="btn-row">
    <button class="btn sel" id="btnAI" onclick="pickMode('ai')">🤖 vs AI</button>
    <button class="btn"     id="btn2P" onclick="pickMode('2p')">👥 2 Players</button>
  </div>

  <div id="diffBlock">
    <div class="sec-lbl" style="margin-bottom:0.5rem;">Difficulty</div>
    <div class="btn-row">
      <button class="btn sel" id="btnEasy" onclick="pickDiff('easy')">😊 Easy</button>
      <button class="btn"     id="btnMed"  onclick="pickDiff('medium')">😤 Medium</button>
      <button class="btn"     id="btnHard" onclick="pickDiff('hard')">🔥 Hard</button>
    </div>
  </div>

  <button class="btn btn-go" onclick="startCountdown()">⚔️ Start!</button>
</div>

<!-- ═══════════════════════════════════════════════
     COUNTDOWN
════════════════════════════════════════════════ -->
<div class="screen" id="countdownScreen">
  <div class="cd-num" id="cdNum">3</div>
</div>

<!-- ═══════════════════════════════════════════════
     GAME
════════════════════════════════════════════════ -->
<div class="screen" id="gameScreen">

  <!-- Player 1 (red / left) -->
  <div class="panel p1">
    <div class="p-label">🔴 <span id="p1name">Player 1</span></div>
    <div class="q-box"  id="q1">—</div>
    <div class="ans-box" id="a1">_</div>
    <div class="np-wrap" id="np1"></div>
  </div>

  <!-- Center column -->
  <div class="ctr">
    <div class="vs-lbl" id="vsLbl">You vs AI</div>

    <!--
      TUG OF WAR SVG SCENE  —  viewBox 0 0 360 130
      ─────────────────────────────────────────────
      Rope: multi-segment path from x=5 through every figure's
            grip point to x=355, with a flag-tracking sag at centre.
            Base path   → #tugRope   (golden gradient)
            Twist layer → #tugRopeTex (dark dashed overlay)
            Both carry class="rope-path" for joint JS updates.

      Flag: lime-green pennant (#flagPennant) on pole at x=180.
            Slides via CSS translateX on #tugFlag.
            Waves continuously; pops on each point scored.

      Red  team (left):  3 figures with 3 distinct poses
        Fig 1 FRONT ANCHOR  – both hands gripping rope, wide feet
        Fig 2 MIDDLE SQUAT  – bent-knee low stance
        Fig 3 BACK LEAN     – body nearly horizontal, braced legs

      Blue team (right): exact x-mirror of red (x ↔ 360−x)

      Grip hand positions on rope:
        Red:  back=(32,66) mid=(60,67) front=(87,64)
        Blue: front=(273,64) mid=(300,67) back=(328,66)
    -->
    <div class="tug-scene">
      <svg id="tugSVG" viewBox="0 0 360 130"
           preserveAspectRatio="xMidYMid meet"
           xmlns="http://www.w3.org/2000/svg">

        <defs>
          <linearGradient id="ropeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#e8c56a"/>
            <stop offset="45%"  stop-color="#c9972a"/>
            <stop offset="100%" stop-color="#7a4f10"/>
          </linearGradient>
        </defs>

        <!-- ── GROUND ───────────────────────────── -->
        <rect x="0" y="113" width="360" height="17" fill="#8fba5a" opacity="0.25" rx="2"/>
        <line x1="0" y1="113" x2="360" y2="113" stroke="#5a7a2a" stroke-width="2.5"/>

        <!-- Boundary stakes -->
        <line x1="87"  y1="107" x2="87"  y2="121" stroke="#d42828" stroke-width="3" stroke-linecap="round"/>
        <line x1="273" y1="107" x2="273" y2="121" stroke="#2050d4" stroke-width="3" stroke-linecap="round"/>
        <line x1="83"  y1="108" x2="91"  y2="108" stroke="#d42828" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="269" y1="108" x2="277" y2="108" stroke="#2050d4" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Centre mark -->
        <line x1="180" y1="105" x2="180" y2="123" stroke="#555" stroke-width="2" stroke-linecap="round"/>
        <line x1="176" y1="106" x2="184" y2="106" stroke="#555" stroke-width="2" stroke-linecap="round"/>

        <!-- ── ROPE ─────────────────────────────── -->
        <!-- Base rope (golden gradient, thin) -->
        <path class="rope-path" id="tugRope"
              d="M 5,66 L 32,66 L 60,67 L 87,64 L 180,72 L 273,64 L 300,67 L 328,66 L 355,66"
              fill="none" stroke="url(#ropeGrad)" stroke-width="4"
              stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Rope twist texture overlay -->
        <path class="rope-path" id="tugRopeTex"
              d="M 5,66 L 32,66 L 60,67 L 87,64 L 180,72 L 273,64 L 300,67 L 328,66 L 355,66"
              fill="none" stroke="#6a3a08" stroke-width="2"
              stroke-dasharray="4 5" stroke-linecap="round" stroke-linejoin="round"
              opacity="0.45"/>

        <!-- ── FLAG (centred at x=180, translated by JS) ── -->
        <g id="tugFlag">
          <!-- Pole -->
          <line x1="180" y1="72" x2="180" y2="49"
                stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
          <!-- Lime-green pennant group (animated) -->
          <g id="flagPennant">
            <polygon points="180,49 204,57 180,65"
                     fill="#3ddc5a" stroke="#22aa33" stroke-width="1.5"
                     stroke-linejoin="round"/>
            <!-- White stripes for detail -->
            <line x1="181" y1="53" x2="198" y2="58"
                  stroke="white" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
            <line x1="181" y1="60" x2="191" y2="63"
                  stroke="white" stroke-width="1"   opacity="0.45" stroke-linecap="round"/>
          </g>
          <!-- Knot at pole base where rope meets flag -->
          <circle cx="180" cy="72" r="4" fill="#c9972a" stroke="#7a4f08" stroke-width="1.5"/>
        </g>

        <!-- ── RED TEAM (left, 3 figures) ─────────────
             Fig 1 FRONT ANCHOR  — cx=69, two-handed grip
             Fig 2 MIDDLE SQUAT  — cx=43, bent knees, low
             Fig 3 BACK LEAN     — cx=14, extreme backward lean
        ─────────────────────────────────────────────── -->
        <g id="teamRed">

          <!-- FIG 1 — FRONT ANCHOR (two hands on rope, wide stance) -->
          <circle cx="69" cy="49" r="9"  fill="#d42828"/>
          <!-- Body -->

<script>
// ── CONFIG ─────────────────────────────────────────────────────
const WIN = 5;

const FLAG_CX   = 180;   // SVG centre x
const FLAG_SPAN = 93;    // half-range in SVG px

// Global rope wobble state (updated each animation frame)
let ropeWobblePhase = 0;
let ropeWobble = 0; // current [-1..1] sine value

// ── STATE ──────────────────────────────────────────────────────
let mode = 'ai', diff = 'easy';
let rope = 0;
let inp1 = '', inp2 = '';
let q1 = null, q2 = null;
let live = false;
let aiTimer = null;

// Stats
let stats = {
  1: { right: 0, wrong: 0, bestMs: Infinity, qStart: 0 },
  2: { right: 0, wrong: 0, bestMs: Infinity, qStart: 0 }
};
let clockInterval = null;
let gameElapsed = 0;

// ── SCREEN HELPER ──────────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('backBtn').classList.toggle('hidden', id === 'gameScreen');
}
function goMenu() {
  live = false;
  clearTimeout(aiTimer);
  stopClock();
  stopAnimLoop();
  document.removeEventListener('keydown', onKey);
  show('menuScreen');
}
function quitGame() { goMenu(); }

// ── MENU ───────────────────────────────────────────────────────
function pickMode(m) {
  mode = m;
  document.getElementById('btnAI').classList.toggle('sel', m === 'ai');
  document.getElementById('btn2P').classList.toggle('sel', m === '2p');
  const db = document.getElementById('diffBlock');
  db.style.opacity = m === 'ai' ? '1' : '0.4';
  db.style.pointerEvents = m === 'ai' ? '' : 'none';
}
function pickDiff(d) {
  diff = d;
  const idMap = { easy: 'btnEasy', medium: 'btnMed', hard: 'btnHard' };
  Object.keys(idMap).forEach(x => {
    document.getElementById(idMap[x]).classList.toggle('sel', x === d);
  });
}

// ── CLOCK & STATS ──────────────────────────────────────────────
function startClock() {
  clearInterval(clockInterval);
  gameElapsed = 0;
  const t0 = Date.now();
  clockInterval = setInterval(() => {
    gameElapsed = Math.floor((Date.now() - t0) / 1000);
    const m = Math.floor(gameElapsed / 60);
    const s = gameElapsed % 60;
    const el = document.getElementById('clockDisplay');
    if (el) el.textContent = `${m}:${s.toString().padStart(2, '0')}`;
  }, 500);
}
function stopClock() {
  clearInterval(clockInterval);
  clockInterval = null;
}
function resetStats() {
  const now = Date.now();
  stats = {
    1: { right: 0, wrong: 0, bestMs: Infinity, qStart: now },
    2: { right: 0, wrong: 0, bestMs: Infinity, qStart: now }
  };
  updateStats();
  const el = document.getElementById('clockDisplay');
  if (el) el.textContent = '0:00';
}
function updateStats() {
  [1, 2].forEach(p => {
    const s = stats[p];
    const best = s.bestMs === Infinity ? '—' : (s.bestMs / 1000).toFixed(1) + 's';
    const rEl = document.getElementById('h' + p + 'r');
    const wEl = document.getElementById('h' + p + 'w');
    const bEl = document.getElementById('h' + p + 'b');
    if (rEl) rEl.textContent = s.right;
    if (wEl) wEl.textContent = s.wrong;
    if (bEl) bEl.textContent = '⚡' + best;
  });
}

// ── QUESTION GENERATOR ─────────────────────────────────────────
function makeQ(d, avoidAns) {
  const ranges = { easy: [2,7], medium: [2,9], hard: [3,12] };
  const [lo, hi] = ranges[d] || [2, 9];
  let a, b, tries = 0;
  do {
    a = lo + Math.floor(Math.random() * (hi - lo + 1));
    b = lo + Math.floor(Math.random() * (hi - lo + 1));
    tries++;
  } while ((a * b < 10 || a * b > 99 || (avoidAns != null && a * b === avoidAns)) && tries < 500);
  if (Math.random() < 0.5) [a, b] = [b, a];
  return { a, b, ans: a * b };
}

// ── NUMPAD BUILDER ─────────────────────────────────────────────
function buildPad(p) {
  const grid = document.createElement('div');
  grid.className = 'numpad';
  [1,2,3,4,5,6,7,8,9,'⌫',0,''].forEach(k => {
    const btn = document.createElement('button');
    btn.className = 'nk';
    btn.textContent = k === '' ? '' : k;
    if (k === '') { btn.style.visibility = 'hidden'; btn.disabled = true; return grid.appendChild(btn); }
    const fire = () => {
      if (!live) return;
      k === '⌫' ? delInp(p) : addInp(p, String(k));
    };
    btn.addEventListener('touchstart', e => { e.preventDefault(); fire(); }, { passive: false });
    btn.addEventListener('mousedown',  e => { e.preventDefault(); fire(); });
    grid.appendChild(btn);
  });
  return grid;
}

// ── INPUT ──────────────────────────────────────────────────────
function addInp(p, d) {
  if (p === 1) {
    if (inp1.length >= 2) return;
    inp1 += d; setAns(1, inp1);
    if (inp1.length === 2) checkAns(1);
  } else {
    if (inp2.length >= 2) return;
    inp2 += d; setAns(2, inp2);
    if (inp2.length === 2) checkAns(2);
  }
}
function delInp(p) {
  if (p === 1 && inp1.length) { inp1 = inp1.slice(0,-1); setAns(1, inp1); }
  if (p === 2 && inp2.length) { inp2 = inp2.slice(0,-1); setAns(2, inp2); }
}
function setAns(p, v) {
  document.getElementById('a' + p).textContent = v || '_';
}

// ── ANSWER CHECK ───────────────────────────────────────────────
function checkAns(p) {
  const inp   = p === 1 ? inp1 : inp2;
  const q     = p === 1 ? q1   : q2;
  const aEl   = document.getElementById('a' + p);
  const qEl   = document.getElementById('q' + p);
  const panel = document.querySelector('.panel.p' + p);

  const restartAnim = el => { el.style.animation = 'none'; void el.offsetWidth; el.style.animation = ''; };
  const elapsed = Date.now() - stats[p].qStart;

  if (parseInt(inp) === q.ans) {
    // Correct
    stats[p].right++;
    if (elapsed < stats[p].bestMs) stats[p].bestMs = elapsed;
    updateStats();

    aEl.classList.remove('ok', 'err');   restartAnim(aEl);
    panel.classList.remove('flash-ok', 'flash-err'); restartAnim(panel);
    qEl.classList.remove('ok', 'err');
    aEl.classList.add('ok'); qEl.classList.add('ok'); panel.classList.add('flash-ok');
    if (p === 1) inp1 = ''; else inp2 = '';
    setTimeout(() => {
      aEl.classList.remove('ok'); qEl.classList.remove('ok'); panel.classList.remove('flash-ok');
      pull(p);
    }, 310);
  } else {
    // Wrong
    stats[p].wrong++;
    updateStats();

    aEl.classList.remove('ok', 'err');   restartAnim(aEl);
    panel.classList.remove('flash-ok', 'flash-err'); restartAnim(panel);
    qEl.classList.remove('ok', 'err');
    aEl.classList.add('err'); qEl.classList.add('err'); panel.classList.add('flash-err');
    if (p === 1) inp1 = ''; else inp2 = '';
    setTimeout(() => {
      aEl.classList.remove('err'); qEl.classList.remove('err'); panel.classList.remove('flash-err');
      setAns(p, '');
    }, 460);
  }
}

// ── ANIMATION LOOP (sway + live rope) ──────────────────────────
// Pivot points match the innermost feet of each team (SVG coords).
const RED_PIVOT  = { x: 83,  y: 113 };
const BLUE_PIVOT = { x: 277, y: 113 };

// Base grip positions on the rope BEFORE any rotation.
// Order: back → mid → front for each team.
const RED_GRIPS  = [
  { x: 32, y: 66 },   // Fig 3 back grip
  { x: 60, y: 67 },   // Fig 2 mid grip
  { x: 87, y: 64 }    // Fig 1 front grip (midpoint of two hands)
];
const BLUE_GRIPS = [
  { x: 273, y: 64 },  // Fig 1 front grip
  { x: 300, y: 67 },  // Fig 2 mid grip
  { x: 328, y: 66 }   // Fig 3 back grip
];

const SWAY = {
  red:  { phase: 0,                 freq: 1.0,  amp: 3, kick: 0 },
  blue: { phase: Math.PI * 0.3,     freq: 0.87, amp: 3, kick: 0 }
};

let animFrameId  = null;
let lastAnimTime = null;

function rotPt(x, y, px, py, deg) {
  const r = deg * Math.PI / 180, c = Math.cos(r), s = Math.sin(r);
  const dx = x - px, dy = y - py;
  return { x: px + dx * c - dy * s, y: py + dx * s + dy * c };
}

function buildRopePath(flagX, redAng, blueAng) {
  const rg = RED_GRIPS.map(g  => rotPt(g.x, g.y, RED_PIVOT.x,  RED_PIVOT.y,  redAng));
  const bg = BLUE_GRIPS.map(g => rotPt(g.x, g.y, BLUE_PIVOT.x, BLUE_PIVOT.y, blueAng));
  const f = v => v.toFixed(1);
  const w = ropeWobble; // [-1..1] gentle live wobble

  // Quadratic bezier ctrl point: midpoint dragged down by 'sag' pixels
  const q = (x1, y1, x2, y2, sag) => ({
    cx: (x1 + x2) / 2,
    cy: (y1 + y2) / 2 + sag
  });

  const fY = 72; // flag knot y (unchanged)

  // Sag amounts – vary slightly with wobble so the rope breathes
  const s1 = 3  + w * 0.8;   // wall → back-lean grip
  const s2 = 5  + w * 1.4;   // between grip figures
  const s3 = 8  + w * 2.2;   // front grip → flag (longest free span)

  const c0 = q(5,         rg[0].y, rg[0].x, rg[0].y, s1);
  const c1 = q(rg[0].x,  rg[0].y, rg[1].x, rg[1].y, s2);
  const c2 = q(rg[1].x,  rg[1].y, rg[2].x, rg[2].y, s2);
  const c3 = q(rg[2].x,  rg[2].y, flagX,   fY,       s3);
  const c4 = q(flagX,    fY,       bg[0].x, bg[0].y,  s3);
  const c5 = q(bg[0].x,  bg[0].y, bg[1].x, bg[1].y,  s2);
  const c6 = q(bg[1].x,  bg[1].y, bg[2].x, bg[2].y,  s2);
  const c7 = q(bg[2].x,  bg[2].y, 355,     bg[2].y,  s1);

  return [
    `M 5,${f(rg[0].y)}`,
    `Q ${f(c0.cx)},${f(c0.cy)} ${f(rg[0].x)},${f(rg[0].y)}`,
    `Q ${f(c1.cx)},${f(c1.cy)} ${f(rg[1].x)},${f(rg[1].y)}`,
    `Q ${f(c2.cx)},${f(c2.cy)} ${f(rg[2].x)},${f(rg[2].y)}`,
    `Q ${f(c3.cx)},${f(c3.cy)} ${f(flagX)},${f(fY)}`,
    `Q ${f(c4.cx)},${f(c4.cy)} ${f(bg[0].x)},${f(bg[0].y)}`,
    `Q ${f(c5.cx)},${f(c5.cy)} ${f(bg[1].x)},${f(bg[1].y)}`,
    `Q ${f(c6.cx)},${f(c6.cy)} ${f(bg[2].x)},${f(bg[2].y)}`,
    `Q ${f(c7.cx)},${f(c7.cy)} 355,${f(bg[2].y)}`
  ].join(' ');
}

function animTick(ts) {
  if (!lastAnimTime) lastAnimTime = ts;
  const dt = Math.min((ts - lastAnimTime) / 1000, 0.05);
  lastAnimTime = ts;

  SWAY.red.phase  += SWAY.red.freq  * dt * 2 * Math.PI;
  SWAY.blue.phase += SWAY.blue.freq * dt * 2 * Math.PI;

  // Rope wobble – gentle continuous breathing at a slightly different rhythm
  ropeWobblePhase += dt * 2.4;
  ropeWobble = Math.sin(ropeWobblePhase);

  ['red', 'blue'].forEach(k => {
    if (SWAY[k].kick !== 0) {
      SWAY[k].kick *= Math.exp(-10 * dt);
      if (Math.abs(SWAY[k].kick) < 0.05) SWAY[k].kick = 0;
    }
  });

  const redAng  = SWAY.red.amp  * Math.sin(SWAY.red.phase)  + SWAY.red.kick;
  const blueAng = SWAY.blue.amp * Math.sin(SWAY.blue.phase) + SWAY.blue.kick;

  document.getElementById('teamRed').setAttribute('transform',
    `rotate(${redAng.toFixed(3)},${RED_PIVOT.x},${RED_PIVOT.y})`);
  document.getElementById('teamBlue').setAttribute('transform',
    `rotate(${blueAng.toFixed(3)},${BLUE_PIVOT.x},${BLUE_PIVOT.y})`);

  const flagX = FLAG_CX + (rope / WIN) * FLAG_SPAN;
  const d = buildRopePath(flagX, redAng, blueAng);
  document.querySelectorAll('.rope-path').forEach(p => p.setAttribute('d', d));

  animFrameId = requestAnimationFrame(animTick);
}

function startAnimLoop() {
  if (animFrameId) cancelAnimationFrame(animFrameId);
  lastAnimTime = null;
  animFrameId  = requestAnimationFrame(animTick);
}

function stopAnimLoop() {
  if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
  lastAnimTime = null;
}

// ── ROPE PULL ──────────────────────────────────────────────────
function pull(p) {
  if (!live) return;
  rope += (p === 1 ? -1 : 1);
  triggerPull(p);
  triggerFlagPop();
  updateTugScene();
  if (rope <= -WIN) { endGame(1); return; }
  if (rope >=  WIN) { endGame(2); return; }
  nextQ(p);
}

function triggerPull(p) {
  if (p === 1) SWAY.red.kick  = -10;  // lean back-left = pull
  else         SWAY.blue.kick =  10;  // lean back-right = pull
}

function triggerFlagPop() {
  const el = document.getElementById('tugFlag');
  if (!el) return;
  el.classList.remove('flag-pop');
  void el.offsetWidth;
  el.classList.add('flag-pop');
  setTimeout(() => el.classList.remove('flag-pop'), 520);
}

// ── TUG SCENE UPDATE ───────────────────────────────────────────
function updateTugScene() {
  const flagX = FLAG_CX + (rope / WIN) * FLAG_SPAN;

  // Slide flag (CSS spring transition)
  document.getElementById('tugFlag').style.transform = `translateX(${flagX - FLAG_CX}px)`;

  // Score dots
  const dc = document.getElementById('scoreDots');
  dc.innerHTML = '';
  for (let i = -(WIN-1); i <= WIN-1; i++) {
    const dot = document.createElement('div');
    dot.className = 'sd' +
      (i < 0 && rope <= i ? ' r' :
       i > 0 && rope >= i ? ' b' : '');
    dc.appendChild(dot);
  }

  document.getElementById('scoreTxt').textContent =
    rope === 0  ? 'Dead even!' :
    rope  <  0  ? `🔴 Red leads ${Math.abs(rope)}-0` :
                  `🔵 Blue leads ${rope}-0`;

  // Winning team sways faster, losing team slower (via anim loop freq)
  SWAY.red.freq  = rope < 0 ? 1.72 : rope > 0 ? 0.67 : 1.0;
  SWAY.blue.freq = rope > 0 ? 1.72 : rope < 0 ? 0.67 : 0.87;
}

// ── NEXT QUESTION ──────────────────────────────────────────────
function nextQ(p) {
  if (!live) return;
  const prev = p === 1 ? q1 : q2;
  const q = makeQ(diff, prev ? prev.ans : null);
  stats[p].qStart = Date.now();
  if (p === 1) {
    q1 = q; inp1 = '';
    document.getElementById('q1').textContent = `${q.a} × ${q.b} = ?`;
    setAns(1, '');
  } else {
    q2 = q; inp2 = '';
    if (mode === 'ai') {
      document.getElementById('q2').textContent = '? × ? = ?';
      setAns(2, '');
      scheduleAI();
    } else {
      document.getElementById('q2').textContent = `${q.a} × ${q.b} = ?`;
      setAns(2, '');
    }
  }
}

// ── AI OPPONENT ────────────────────────────────────────────────
function scheduleAI() {
  clearTimeout(aiTimer);
  const delay = {
    easy:   3800 + Math.random() * 2800,
    medium: 1600 + Math.random() * 1800,
    hard:    500 + Math.random() * 1000
  }[diff];

  const fill = document.querySelector('.ai-fill');
  if (fill) {
    fill.style.transition = 'none'; fill.style.width = '0%';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      fill.style.transition = `width ${delay}ms linear`;
      fill.style.width = '100%';
    }));
  }

  aiTimer = setTimeout(() => {
    if (!live) return;
    const elapsed = Date.now() - stats[2].qStart;
    stats[2].right++;
    if (elapsed < stats[2].bestMs) stats[2].bestMs = elapsed;
    updateStats();

    document.getElementById('q2').textContent = `${q2.a} × ${q2.b} = ?`;
    setAns(2, String(q2.ans));
    const aEl = document.getElementById('a2');
    aEl.classList.add('ok');
    setTimeout(() => {
      aEl.classList.remove('ok');
      inp2 = ''; setAns(2, '');
      pull(2);
    }, 220);
  }, delay);
}

// ── COUNTDOWN ──────────────────────────────────────────────────
function startCountdown() {
  show('countdownScreen');
  const el = document.getElementById('cdNum');
  let i = 0;
  const seq = ['3', '2', '1', 'GO!'];
  (function tick() {
    el.textContent = seq[i];
    el.className = 'cd-num' + (seq[i] === 'GO!' ? ' go' : '');
    el.style.animation = 'none'; void el.offsetWidth; el.style.animation = '';
    i++;
    if (i < seq.length) setTimeout(tick, 700);
    else setTimeout(startGame, 450);
  })();
}

// ── START GAME ─────────────────────────────────────────────────
function startGame() {
  rope = 0; inp1 = ''; inp2 = ''; live = true;
  clearTimeout(aiTimer);
  stopClock();

  document.getElementById('p1name').textContent = 'Player 1';
  document.getElementById('p2name').textContent = mode === 'ai' ? 'AI' : 'Player 2';
  document.getElementById('vsLbl').textContent  = mode === 'ai' ? 'You vs AI' : 'P1 vs P2';

  // Update HUD labels
  const n1 = document.getElementById('hudName1');
  const n2 = document.getElementById('hudName2');
  if (n1) n1.textContent = '🔴 P1';
  if (n2) n2.textContent = mode === 'ai' ? '🤖 AI' : '🔵 P2';

  // Reset stats and start clock
  resetStats();
  startClock();

  // Reset sway state and start animation loop
  SWAY.red.phase  = 0;   SWAY.red.freq  = 1.0;  SWAY.red.kick  = 0;
  SWAY.blue.phase = Math.PI * 0.3; SWAY.blue.freq = 0.87; SWAY.blue.kick = 0;
  ropeWobblePhase = 0;   ropeWobble = 0;
  startAnimLoop();

  // Snap flag back to centre instantly, then re-enable spring
  const flag = document.getElementById('tugFlag');
  flag.style.transition = 'none';
  flag.style.transform  = 'translateX(0)';
  document.querySelectorAll('.rope-path').forEach(p => p.setAttribute('d', buildRopePath(FLAG_CX, 0, 0)));
  requestAnimationFrame(() => requestAnimationFrame(() => {
    flag.style.transition = '';
  }));

  // Numpad / AI area
  const np1 = document.getElementById('np1');
  np1.innerHTML = ''; np1.appendChild(buildPad(1));
  const np2 = document.getElementById('np2');
  np2.innerHTML = '';
  if (mode === '2p') {
    np2.appendChild(buildPad(2));
  } else {
    np2.innerHTML = `
      <div class="ai-area">
        <div class="ai-lbl">🤖 Thinking…</div>
        <div class="ai-bar"><div class="ai-fill"></div></div>
      </div>`;
  }

  updateTugScene();

  q1 = makeQ(diff, null);
  q2 = makeQ(diff, q1.ans);
  stats[1].qStart = Date.now();
  stats[2].qStart = Date.now();

  document.getElementById('q1').textContent = `${q1.a} × ${q1.b} = ?`;
  setAns(1, '');
  if (mode === '2p') {
    document.getElementById('q2').textContent = `${q2.a} × ${q2.b} = ?`;
    setAns(2, '');
  } else {
    document.getElementById('q2').textContent = '? × ? = ?';
    setAns(2, '');
    scheduleAI();
  }

  show('gameScreen');
  document.removeEventListener('keydown', onKey);
  document.addEventListener('keydown', onKey);
}

function onKey(e) {
  if (!live) return;
  if (e.key >= '0' && e.key <= '9') addInp(1, e.key);
  else if (e.key === 'Backspace') delInp(1);
}

// ── END GAME ───────────────────────────────────────────────────
function endGame(winner) {
  live = false;
  clearTimeout(aiTimer);
  stopClock();
  stopAnimLoop();
  document.removeEventListener('keydown', onKey);
  const p1wins = winner === 1;
  document.getElementById('winBanner').textContent =
    p1wins ? (mode === 'ai' ? '🏆 You Win!'   : '🏆 Red Wins!')
           : (mode === 'ai' ? '🤖 AI Wins!'   : '🏆 Blue Wins!');
  document.getElementById('winBanner').className = 'win-banner ' + (p1wins ? 'r' : 'b');
  document.getElementById('winSub').textContent =
    p1wins ? (mode === 'ai' ? 'You out-multiplied the AI! 🎉' : 'Red team pulls through! 🎉')
           : (mode === 'ai' ? 'The AI was faster this time…'  : 'Blue team dominates! 🎉');
  show('winScreen');
  launchConfetti(p1wins ? '#d42828' : '#2050d4');
}

// ── CONFETTI ───────────────────────────────────────────────────
function launchConfetti(mainCol) {
  const cv = document.getElementById('confettiCanvas');
  cv.width = window.innerWidth; cv.height = window.innerHeight;
  const ctx = cv.getContext('2d');
  const palette = [mainCol, '#f7c948', '#4caf50', '#ff9800', '#e91e63', '#9c27b0'];
  const ps = Array.from({ length: 120 }, () => ({
    x:   Math.random() * cv.width,
    y:  -30 - Math.random() * 160,
    vx:  (Math.random() - 0.5) * 4,
    vy:  2 + Math.random() * 3.5,
    w:   7 + Math.random() * 8,
    h:   4 + Math.random() * 5,
    rot: Math.random() * Math.PI * 2,
    vr:  (Math.random() - 0.5) * 0.13,
    c:   palette[Math.floor(Math.random() * palette.length)],
    a:   1
  }));
  (function draw() {
    ctx.clearRect(0, 0, cv.width, cv.height);
    let alive = false;
    ps.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.07; p.rot += p.vr;
      if (p.y > cv.height) p.a -= 0.025;
      if (p.a > 0) alive = true;
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.a);
      ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.c;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    });
    if (alive) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, cv.width, cv.height);
  })();
}

// ── INIT ───────────────────────────────────────────────────────
pickMode('ai');
pickDiff('easy');
</script>
