<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⏳ Timeline Jumper</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --beige: #f5ead6;
    --beige-dark: #ecdcc0;
    --beige-darker: #e0c99a;
    --cream: #fdf6e8;
    --ink: #3b2f1e;
    --ink-light: #7a5c3a;
    --teal: #3dbfb0;
    --teal-bg: #d6f5f2;
    --teal-dark: #1a7a72;
    --correct: #5cbb6f;
    --wrong: #e8453c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--beige);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    color: var(--ink);
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* NAV */
  .site-nav {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.7rem 1.25rem;
    background: var(--cream);
    border-bottom: 3px solid var(--ink);
    position: sticky;
    top: 0;
    z-index: 300;
  }
  .site-nav-back {
    font-family: 'Fredoka One', cursive;
    font-size: 0.95rem;
    color: var(--ink);
    text-decoration: none;
    background: var(--beige);
    border: 2.5px solid var(--ink);
    border-radius: 10px;
    padding: 0.28rem 0.75rem;
    transition: transform 0.15s, background 0.15s;
  }
  .site-nav-back:hover { background: var(--beige-dark); transform: scale(1.05); }
  .site-nav-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.15rem;
  }

  /* SCREENS */
  .screen { display: none; }
  .screen.active { display: block; }

  /* =====================
     MODE SCREEN
  ===================== */
  #modeScreen {
    max-width: 620px;
    margin: 0 auto;
    padding: 2rem 1.25rem 3rem;
    text-align: center;
  }
  .mode-icon {
    font-size: 4.5rem;
    display: inline-block;
    animation: iconBob 2.8s ease-in-out infinite;
    filter: drop-shadow(0 6px 14px rgba(0,0,0,0.12));
    margin-bottom: 0.4rem;
  }
  @keyframes iconBob {
    0%,100% { transform: translateY(0) rotate(-4deg); }
    50%      { transform: translateY(-12px) rotate(4deg); }
  }
  .mode-title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 7vw, 3rem);
    text-shadow: 3px 3px 0 var(--beige-darker);
    margin-bottom: 0.5rem;
    line-height: 1.1;
  }
  .mode-sub {
    color: var(--ink-light);
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 2rem;
  }
  .mode-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1rem;
    max-width: 380px;
    margin: 0 auto;
  }
  .mode-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.25rem;
    padding: 1.1rem 1.5rem;
    border: 3px solid var(--ink);
    border-radius: 18px;
    box-shadow: 5px 5px 0 var(--ink);
    cursor: pointer;
    transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.15s;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .mode-btn:hover { transform: translateY(-3px); box-shadow: 5px 8px 0 var(--ink); }
  .mode-btn:active { transform: translateY(0); box-shadow: 2px 2px 0 var(--ink); }
  .mode-us    { background: #fde8e7; color: #b02020; }
  .mode-world { background: var(--teal-bg); color: var(--teal-dark); }
  .mode-sci   { background: #ede0ff; color: #5c2ea8; }
  .mode-btn-icon { font-size: 2rem; }
  .mode-btn-text { display: flex; flex-direction: column; }
  .mode-btn-name { font-size: 1.2rem; }
  .mode-btn-desc { font-size: 0.72rem; font-weight: 700; opacity: 0.75; margin-top: 0.1rem; }

  /* =====================
     GAME SCREEN
  ===================== */
  #gameScreen { max-width: 860px; margin: 0 auto; padding: 1rem 1rem 2rem; }

  .game-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .game-round-title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1rem, 3.5vw, 1.4rem);
    color: var(--ink);
  }
  .game-score-badge {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    background: var(--cream);
    border: 2.5px solid var(--ink);
    border-radius: 10px;
    padding: 0.25rem 0.75rem;
    box-shadow: 3px 3px 0 var(--ink);
  }

  /* DECK */
  .deck-label {
    font-family: 'Fredoka One', cursive;
    font-size: 0.9rem;
    color: var(--ink-light);
    margin-bottom: 0.5rem;
  }
  .deck {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    min-height: 130px;
    background: var(--cream);
    border: 2.5px dashed var(--beige-darker);
    border-radius: 16px;
    padding: 0.75rem;
    margin-bottom: 1.25rem;
    align-items: flex-start;
    align-content: flex-start;
  }

  /* EVENT CARDS */
  .event-card {
    width: clamp(110px, 18vw, 148px);
    background: var(--cream);
    border: 3px solid var(--ink);
    border-radius: 14px;
    box-shadow: 3px 3px 0 var(--ink);
    cursor: grab;
    overflow: hidden;
    transition: transform 0.15s cubic-bezier(.34,1.56,.64,1), box-shadow 0.15s;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
  }
  .event-card:hover { transform: translateY(-2px) scale(1.02); }
  .event-card.dragging { opacity: 0.35; cursor: grabbing; }
  .event-card.correct-place { border-color: var(--correct); box-shadow: 3px 3px 0 var(--correct); }
  .event-card.wrong-place   { border-color: var(--wrong);   box-shadow: 3px 3px 0 var(--wrong); }

  .card-img-wrap {
    width: 100%;
    height: 72px;
    overflow: hidden;
    background: var(--beige-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 2px solid var(--beige-darker);
    position: relative;
  }
  .card-emoji { font-size: 2.2rem; line-height: 1; pointer-events: none; }
  .card-wiki-img {
    display: none;
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    inset: 0;
  }
  .card-body { padding: 0.45rem 0.5rem 0.5rem; }
  .card-title {
    font-family: 'Fredoka One', cursive;
    font-size: 0.8rem;
    color: var(--ink);
    line-height: 1.25;
    margin-bottom: 0.25rem;
  }
  .card-desc {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--ink-light);
    line-height: 1.4;
  }
  .card-wiki-badge {
    display: inline-block;
    font-size: 0.68rem;
    font-weight: 800;
    color: var(--teal-dark);
    background: var(--teal-bg);
    border: 1.5px solid var(--teal);
    border-radius: 6px;
    padding: 0.1rem 0.4rem;
    margin-top: 0.45rem;
    text-decoration: none;
    cursor: pointer;
  }
  .event-card.clickable { cursor: pointer; }
  .event-card.clickable:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 3px 6px 0 var(--ink);
  }

  /* DRAG GHOST */
  .drag-ghost {
    position: fixed;
    pointer-events: none;
    z-index: 500;
    opacity: 0.92;
    transform: rotate(4deg) scale(1.06);
    cursor: grabbing;
    transition: none;
  }

  /* TIMELINE */
  .timeline-section { margin-bottom: 1.25rem; }
  .timeline-section-label {
    font-family: 'Fredoka One', cursive;
    font-size: 0.9rem;
    color: var(--ink-light);
    margin-bottom: 0.5rem;
  }
  .timeline-wrapper {
    position: relative;
    padding: 0 20px;
    overflow-x: auto;
  }
  .timeline-track {
    display: flex;
    align-items: center;
    height: 12px;
    margin-bottom: 0;
    min-width: 460px;
  }
  .timeline-line {
    flex: 1;
    height: 4px;
    background: var(--ink);
    border-radius: 2px;
  }
  .timeline-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--ink);
    border: 2px solid var(--cream);
    box-shadow: 0 0 0 2px var(--ink);
    flex-shrink: 0;
  }
  .timeline-slots {
    display: flex;
    gap: 0;
    min-width: 460px;
    margin-top: 2px;
  }
  .timeline-slot-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
  }
  .slot-year {
    font-family: 'Fredoka One', cursive;
    font-size: 0.85rem;
    color: var(--teal-dark);
    background: var(--teal-bg);
    border: 2px solid var(--teal);
    border-radius: 8px;
    padding: 0.1rem 0.4rem;
    text-align: center;
    white-space: nowrap;
  }
  .slot-drop {
    width: clamp(108px, 17vw, 145px);
    min-height: 130px;
    border: 2.5px dashed var(--beige-darker);
    border-radius: 14px;
    background: var(--cream);
    transition: background 0.2s, border-color 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--beige-darker);
    position: relative;
  }
  .slot-drop.drag-over {
    background: var(--teal-bg);
    border-color: var(--teal);
    border-style: solid;
  }
  .slot-drop.occupied { border-style: solid; border-color: var(--ink); background: transparent; }
  .slot-drop.correct-slot { border-color: var(--correct); background: #e8f8eb; }
  .slot-drop.wrong-slot   { border-color: var(--wrong);   background: #fde8e7; }

  /* CHECK / CONTINUE */
  .action-row {
    display: flex;
    gap: 0.75rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .check-btn, .continue-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    padding: 0.75rem 2rem;
    border: 3px solid var(--ink);
    border-radius: 14px;
    box-shadow: 4px 4px 0 var(--ink);
    cursor: pointer;
    transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.15s;
  }
  .check-btn { background: var(--teal); color: #fff; }
  .check-btn:disabled {
    background: var(--beige-dark);
    color: var(--ink-light);
    cursor: not-allowed;
    box-shadow: 2px 2px 0 var(--ink);
    transform: none;
  }
  .check-btn:not(:disabled):hover,
  .continue-btn:hover { transform: translateY(-3px); box-shadow: 4px 7px 0 var(--ink); }
  .continue-btn { background: var(--correct); color: #fff; display: none; }

  /* ROUND RESULT SUMMARY */
  .round-result-bar {
    background: var(--cream);
    border: 3px solid var(--ink);
    border-radius: 16px;
    box-shadow: 4px 4px 0 var(--ink);
    padding: 0.85rem 1.25rem;
    margin-bottom: 1rem;
    display: none;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .round-result-bar.visible { display: flex; }
  .rr-icon { font-size: 2rem; }
  .rr-text { font-family: 'Fredoka One', cursive; font-size: 1.15rem; flex: 1; }
  .rr-pts  { font-family: 'Fredoka One', cursive; font-size: 1.4rem; color: var(--teal-dark); }

  /* =====================
     RESULTS SCREEN
  ===================== */
  #resultsScreen {
    max-width: 520px;
    margin: 0 auto;
    padding: 2rem 1.25rem 3rem;
    text-align: center;
  }
  .res-icon  { font-size: 5rem; display: block; margin-bottom: 0.3rem; }
  .res-grade { font-family: 'Fredoka One', cursive; font-size: 5rem; line-height: 1; margin-bottom: 0.3rem; }
  .res-score { font-family: 'Fredoka One', cursive; font-size: 2rem; margin-bottom: 1.5rem; }
  .res-breakdown {
    width: 100%;
    max-width: 400px;
    margin: 0 auto 2rem;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }
  .res-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--cream);
    border: 2.5px solid var(--ink);
    border-radius: 12px;
    padding: 0.6rem 1rem;
    box-shadow: 3px 3px 0 var(--ink);
  }
  .res-row-label { font-weight: 800; font-size: 0.9rem; }
  .res-row-pts   { font-family: 'Fredoka One', cursive; font-size: 1.2rem; color: var(--teal-dark); }
  .play-again-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    padding: 0.8rem 2.5rem;
    background: var(--teal);
    color: #fff;
    border: 3px solid var(--ink);
    border-radius: 14px;
    box-shadow: 4px 4px 0 var(--ink);
    cursor: pointer;
    transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.15s;
  }
  .play-again-btn:hover { transform: translateY(-3px); box-shadow: 4px 7px 0 var(--ink); }

  /* LOADING SKELETON */
  .img-skeleton {
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, var(--beige-dark) 25%, var(--beige) 50%, var(--beige-dark) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    position: absolute;
    inset: 0;
  }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  @media (max-width: 600px) {
    #gameScreen { padding: 0.75rem 0.6rem 2rem; }
    .timeline-wrapper { padding: 0 6px; }
    .slot-year { font-size: 0.72rem; }
  }
</style>
</head>
<body>

<nav class="site-nav">
  <a href="../" class="site-nav-back">← Home</a>
  <span class="site-nav-title">⏳ Timeline Jumper</span>
</nav>

<!-- MODE SCREEN -->
<div class="screen active" id="modeScreen">
  <div class="mode-icon">⏳</div>
  <h1 class="mode-title">Timeline Jumper</h1>
  <p class="mode-sub">Drag events to the right spot in history!</p>
  <div class="mode-grid">
    <button class="mode-btn mode-us" onclick="selectMode('us_history')">
      <span class="mode-btn-icon">🇺🇸</span>
      <div class="mode-btn-text">
        <span class="mode-btn-name">US History</span>
        <span class="mode-btn-desc">Colonial Era · Civil War · Modern America</span>
      </div>
    </button>
    <button class="mode-btn mode-world" onclick="selectMode('world_history')">
      <span class="mode-btn-icon">🌍</span>
      <div class="mode-btn-text">
        <span class="mode-btn-name">World History</span>
        <span class="mode-btn-desc">Medieval · Revolutions · World Wars</span>
      </div>
    </button>
    <button class="mode-btn mode-sci" onclick="selectMode('science')">
      <span class="mode-btn-icon">🔬</span>
      <div class="mode-btn-text">
        <span class="mode-btn-name">Science Discoveries</span>
        <span class="mode-btn-desc">Copernicus to the Human Genome</span>
      </div>
    </button>
  </div>
</div>

<!-- GAME SCREEN -->
<div class="screen" id="gameScreen">
  <div class="game-header">
    <div class="game-round-title" id="gameRoundTitle">Round 1: Colonial America</div>
    <div class="game-score-badge">⭐ Score: <span id="scoreDisplay">0</span></div>
  </div>

  <div class="round-result-bar" id="roundResultBar">
    <span class="rr-icon" id="rrIcon">🎉</span>
    <span class="rr-text" id="rrText">Great job!</span>
    <span class="rr-pts" id="rrPts">+60</span>
  </div>

  <div class="deck-label">Drag event cards to the timeline below 👇</div>
  <div class="deck" id="deck"></div>

  <div class="timeline-section">
    <div class="timeline-section-label">📅 Timeline — drag each card to its year</div>
    <div class="timeline-wrapper">
      <div class="timeline-track" id="timelineTrack"></div>
      <div class="timeline-slots" id="timelineSlots"></div>
    </div>
  </div>

  <div class="action-row">
    <button class="check-btn" id="checkBtn" disabled onclick="checkAnswers()">✓ Check My Answers</button>
    <button class="continue-btn" id="continueBtn" onclick="continueGame()">▶ Continue</button>
  </div>
</div>

<!-- RESULTS SCREEN -->
<div class="screen" id="resultsScreen">
  <span class="res-icon" id="resIcon">🏆</span>
  <div class="res-grade" id="resGrade">A</div>
  <div class="res-score" id="resScore">Final Score: 0 / 300</div>
  <div class="res-breakdown" id="resBreakdown"></div>
  <button class="play-again-btn" onclick="showScreen('modeScreen')">🎮 Play Again</button>
</div>

<script>
/* ============================================================
   GAME DATA
============================================================ */
const MODES = {
  us_history: {
    name: 'US History', emoji: '🇺🇸',
    rounds: [
      {
        title: 'Colonial America',

          { id:'declaration',  year:1776, title:'Declaration of Independence',   desc:'The thirteen colonies declare independence from Britain, authored by Thomas Jefferson.',    wiki:'United States Declaration of Independence',          emoji:'🦅' },

  },
  world_history: {
    name: 'World History', emoji: '🌍',
    rounds: [
      {
        title: 'Medieval World',
        events: [
          { id:'crusades',     year:1096, title:'First Crusade Begins',          desc:'Pope Urban II calls on Christian knights to recapture Jerusalem from Muslim rule.',         wiki:'First Crusade',                                     emoji:'⚔️' },

          { id:'black_death',  year:1347, title:'Black Death Strikes Europe',    desc:'The bubonic plague arrives in Europe, eventually killing one-third of its population.',     wiki:'Black Death',                                       emoji:'💀' },

          { id:'columbus',     year:1492, title:'Columbus Reaches the Americas', desc:'Christopher Columbus lands in the Bahamas, beginning European contact with the Americas.', wiki:'Christopher Columbus',                               emoji:'⛵' }
        ]
      },
      {
        title: 'Age of Revolutions',
        events: [
          { id:'galileo',      year:1609, title:"Galileo's Telescope",          desc:'Galileo improves the telescope and discovers the moons of Jupiter, supporting heliocentrism.', wiki:'Galileo Galilei',                                emoji:'🔭' },

          { id:'napoleon',     year:1804, title:'Napoleon Crowned Emperor',     desc:"Napoleon Bonaparte crowns himself Emperor of France after rising to power.",                wiki:'Napoleon',                                          emoji:'👑' },

        ]

/* ============================================================
   GAME STATE
============================================================ */
let currentMode = null;
let currentRound = 0;        // 0-indexed
let totalScore = 0;
let roundScores = [];
let checked = false;
let imageCache = {};

// slotContents[slotIdx] = event id string | null
let slotContents = [null, null, null, null, null];

/* ============================================================
   DRAG STATE
============================================================ */
let dragState = null; // { cardEl, ghost, originIsSlot, originSlotIdx, startX, startY, originRect }

/* ============================================================
   SCREEN MANAGEMENT
============================================================ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

/* ============================================================
   MODE & ROUND SELECTION
============================================================ */
function selectMode(modeId) {
  currentMode = modeId;
  currentRound = 0;
  totalScore = 0;
  roundScores = [];
  showScreen('gameScreen');
  loadRound();
}

function loadRound() {
  checked = false;
  slotContents = [null, null, null, null, null];

  const mode = MODES[currentMode];
  const round = mode.rounds[currentRound];
  const events = shuffle([...round.events]);

  document.getElementById('gameRoundTitle').textContent =
    `${mode.emoji} Round ${currentRound + 1}/3: ${round.title}`;
  document.getElementById('scoreDisplay').textContent = totalScore;

  const rr = document.getElementById('roundResultBar');
  rr.classList.remove('visible');

  const checkBtn    = document.getElementById('checkBtn');
  const continueBtn = document.getElementById('continueBtn');
  checkBtn.disabled = true;
  checkBtn.style.display = '';
  continueBtn.style.display = 'none';

  buildDeck(events);
  buildTimeline(round.events); // sorted by year
  loadImages(events);
}

/* ============================================================
   DECK BUILDER
============================================================ */
function buildDeck(shuffledEvents) {
  const deck = document.getElementById('deck');
  deck.innerHTML = '';
  shuffledEvents.forEach(evt => {
    const card = createCard(evt);
    deck.appendChild(card);
  });
}

function createCard(evt) {
  const card = document.createElement('div');
  card.className = 'event-card';
  card.dataset.id = evt.id;
  card.innerHTML = `
    <div class="card-img-wrap">
      <div class="img-skeleton"></div>
      <span class="card-emoji">${evt.emoji}</span>
      <img class="card-wiki-img" alt="${evt.title}" draggable="false">
    </div>
    <div class="card-body">
      <div class="card-title">${evt.title}</div>
      <div class="card-desc">${evt.desc}</div>
    </div>
  `;
  attachDragHandlers(card);
  return card;
}

/* ============================================================
   TIMELINE BUILDER
============================================================ */
function buildTimeline(sortedEvents) {
  // Build track (dots and lines)
  const track = document.getElementById('timelineTrack');
  track.innerHTML = '';
  sortedEvents.forEach((_, i) => {
    track.appendChild(makeDot());
    if (i < sortedEvents.length - 1) track.appendChild(makeLine());
  });

  // Build slots
  const slotsContainer = document.getElementById('timelineSlots');
  slotsContainer.innerHTML = '';
  sortedEvents.forEach((evt, i) => {
    const col = document.createElement('div');
    col.className = 'timeline-slot-col';

    const yearLabel = document.createElement('div');
    yearLabel.className = 'slot-year';
    yearLabel.textContent = formatYear(evt.year);

    const drop = document.createElement('div');
    drop.className = 'slot-drop';
    drop.dataset.slotIdx = i;
    drop.dataset.year = evt.year;
    drop.textContent = 'Drop here';

    col.appendChild(yearLabel);
    col.appendChild(drop);
    slotsContainer.appendChild(col);

    // Drag-over highlighting
    drop.addEventListener('pointerenter', () => {
      if (dragState) drop.classList.add('drag-over');
    });
    drop.addEventListener('pointerleave', () => {
      drop.classList.remove('drag-over');
    });
  });
}

function makeDot() {
  const d = document.createElement('div');
  d.className = 'timeline-dot';
  return d;
}
function makeLine() {
  const l = document.createElement('div');
  l.className = 'timeline-line';
  return l;
}
function formatYear(y) {
  return y < 0 ? Math.abs(y) + ' BCE' : y.toString();
}

/* ============================================================
   WIKIPEDIA IMAGE LOADING
============================================================ */
async function fetchWikiImage(title) {
  if (imageCache[title] !== undefined) return imageCache[title];
  try {
    const url = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=pageimages&pithumbsize=300&format=json&origin=*`;
    const res = await fetch(url, { signal: AbortSignal.timeout(6000) });
    const data = await res.json();
    const page = Object.values(data.query.pages)[0];
    const src = page?.thumbnail?.source || null;
    imageCache[title] = src;
    return src;
  } catch {
    imageCache[title] = null;
    return null;
  }
}

function loadImages(events) {
  events.forEach(async evt => {
    const src = await fetchWikiImage(evt.wiki);
    const card = document.querySelector(`.event-card[data-id="${evt.id}"]`);
    if (!card || !src) {
      // Remove skeleton, show emoji
      card?.querySelector('.img-skeleton')?.remove();
      return;
    }
    const img = card.querySelector('.card-wiki-img');
    const emoji = card.querySelector('.card-emoji');
    const skeleton = card.querySelector('.img-skeleton');
    img.src = src;
    img.onload = () => {
      skeleton?.remove();
      emoji.style.display = 'none';
      img.style.display = 'block';
    };
    img.onerror = () => { skeleton?.remove(); };
  });
}

/* ============================================================
   DRAG AND DROP
============================================================ */
function attachDragHandlers(card) {
  card.addEventListener('pointerdown', onCardPointerDown, { passive: false });
}

function onCardPointerDown(e) {
  if (checked) return;
  e.preventDefault();
  const card = e.currentTarget;
  const rect = card.getBoundingClientRect();

  // Is this card in a slot?
  const slotDrop = card.closest('.slot-drop');
  const originIsSlot = !!slotDrop;
  const originSlotIdx = originIsSlot ? parseInt(slotDrop.dataset.slotIdx) : -1;

  // Create ghost
  const ghost = card.cloneNode(true);
  ghost.className = card.className + ' drag-ghost';
  ghost.style.width  = rect.width + 'px';
  ghost.style.left   = rect.left  + 'px';
  ghost.style.top    = rect.top   + 'px';
  document.body.appendChild(ghost);

  card.classList.add('dragging');

  dragState = {
    cardEl: card,
    cardId: card.dataset.id,
    ghost,
    originIsSlot,
    originSlotIdx,
    startX: e.clientX,
    startY: e.clientY,
    originLeft: rect.left,
    originTop:  rect.top
  };
}

document.addEventListener('pointermove', (e) => {
  if (!dragState) return;
  const dx = e.clientX - dragState.startX;
  const dy = e.clientY - dragState.startY;
  dragState.ghost.style.left = (dragState.originLeft + dx) + 'px';
  dragState.ghost.style.top  = (dragState.originTop  + dy) + 'px';

  // Update drag-over on slots
  const ghostRect = dragState.ghost.getBoundingClientRect();
  const ghostCX = ghostRect.left + ghostRect.width  / 2;
  const ghostCY = ghostRect.top  + ghostRect.height / 2;
  document.querySelectorAll('.slot-drop').forEach(slot => {
    const r = slot.getBoundingClientRect();
    const over = ghostCX >= r.left && ghostCX <= r.right && ghostCY >= r.top && ghostCY <= r.bottom;
    slot.classList.toggle('drag-over', over);
  });
});

document.addEventListener('pointerup', (e) => {
  if (!dragState) return;

  const ghostRect = dragState.ghost.getBoundingClientRect();
  const ghostCX = ghostRect.left + ghostRect.width  / 2;
  const ghostCY = ghostRect.top  + ghostRect.height / 2;

  // Find slot under ghost center
  let targetSlot = null;
  document.querySelectorAll('.slot-drop').forEach(slot => {
    slot.classList.remove('drag-over');
    const r = slot.getBoundingClientRect();
    if (ghostCX >= r.left && ghostCX <= r.right && ghostCY >= r.top && ghostCY <= r.bottom) {
      targetSlot = slot;
    }
  });

  const { cardEl, cardId, originIsSlot, originSlotIdx } = dragState;
  cardEl.classList.remove('dragging');
  dragState.ghost.remove();
  dragState = null;

  if (targetSlot) {
    const slotIdx = parseInt(targetSlot.dataset.slotIdx);
    placeCardInSlot(cardEl, cardId, slotIdx, originIsSlot, originSlotIdx);
  } else {
    // Return to deck if not dropped on slot
    if (originIsSlot) {
      returnCardToDeck(cardEl, cardId, originSlotIdx);
    }
    // If from deck, card stays in deck (DOM unchanged)
  }

  updateCheckButton();
});

function placeCardInSlot(cardEl, cardId, slotIdx, fromSlot, fromSlotIdx) {
  const slot = document.querySelector(`.slot-drop[data-slot-idx="${slotIdx}"]`);
  const existingCardId = slotContents[slotIdx];

  // If slot is occupied, evict the existing card
  if (existingCardId) {
    const existingCard = slot.querySelector('.event-card');
    if (existingCard) {
      if (fromSlot && fromSlotIdx === slotIdx) {
        // Dropped on same slot — no-op
        return;
      }
      // Return displaced card to deck
      returnCardToDeck(existingCard, existingCardId, slotIdx);
    }
  }

  // Clear card from origin slot
  if (fromSlot) {
    slotContents[fromSlotIdx] = null;
    const fromSlotEl = document.querySelector(`.slot-drop[data-slot-idx="${fromSlotIdx}"]`);
    fromSlotEl.textContent = 'Drop here';
    fromSlotEl.classList.remove('occupied');
  } else {
    // Remove from deck
    cardEl.remove();
  }

  // Place in new slot
  slotContents[slotIdx] = cardId;
  slot.textContent = '';
  slot.classList.add('occupied');
  slot.appendChild(cardEl);
}

function returnCardToDeck(cardEl, cardId, fromSlotIdx) {
  if (fromSlotIdx >= 0) {
    slotContents[fromSlotIdx] = null;
    const fromSlotEl = document.querySelector(`.slot-drop[data-slot-idx="${fromSlotIdx}"]`);
    if (fromSlotEl) {
      fromSlotEl.textContent = 'Drop here';
      fromSlotEl.classList.remove('occupied');
    }
  }
  const deck = document.getElementById('deck');
  cardEl.remove();
  deck.appendChild(cardEl);
}

function updateCheckButton() {
  const allFilled = slotContents.every(s => s !== null);
  document.getElementById('checkBtn').disabled = !allFilled;
}

/* ============================================================
   CHECK ANSWERS
============================================================ */
function checkAnswers() {
  if (checked) return;
  checked = true;

  const mode = MODES[currentMode];
  const round = mode.rounds[currentRound];
  const events = round.events; // sorted by year

  let correct = 0;

  events.forEach((evt, i) => {
    const slot = document.querySelector(`.slot-drop[data-slot-idx="${i}"]`);
    const placedId = slotContents[i];
    const isCorrect = placedId === evt.id;

    if (isCorrect) {
      correct++;
      slot.classList.add('correct-slot');
      const card = slot.querySelector('.event-card');
      if (card) card.classList.add('correct-place');
    } else {
      slot.classList.add('wrong-slot');
      const card = slot.querySelector('.event-card');
      if (card) card.classList.add('wrong-place');
    }
  });

  const pts = correct * 20;
  totalScore += pts;
  roundScores.push({ round: currentRound, correct, pts, total: events.length });

  document.getElementById('scoreDisplay').textContent = totalScore;

  // Show result bar
  const rr = document.getElementById('roundResultBar');
  const icons = correct === 5 ? '🏆' : correct >= 3 ? '🎉' : correct >= 2 ? '👍' : '💪';
  const msgs  = correct === 5 ? 'Perfect! All 5 correct!' : `${correct} out of 5 correct`;
  document.getElementById('rrIcon').textContent = icons;
  document.getElementById('rrText').textContent = msgs;
  document.getElementById('rrPts').textContent  = `+${pts} pts`;
  rr.classList.add('visible');

  // Switch buttons
  document.getElementById('checkBtn').style.display  = 'none';
  document.getElementById('continueBtn').style.display = '';
  document.getElementById('continueBtn').textContent =
    currentRound < 2 ? `▶ Round ${currentRound + 2}` : '🏁 See Results';

  makeCardsClickable(events);

  rr.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

/* ============================================================
   WIKIPEDIA LINKS (after check)
============================================================ */
function makeCardsClickable(events) {
  const eventMap = {};
  events.forEach(evt => { eventMap[evt.id] = evt; });

  document.querySelectorAll('.slot-drop .event-card').forEach(card => {
    const evt = eventMap[card.dataset.id];
    if (!evt) return;

    card.classList.add('clickable');
    card.title = `Click to read about "${evt.title}" on Wikipedia`;

    const badge = document.createElement('a');
    badge.className = 'card-wiki-badge';
    badge.textContent = '📖 Wikipedia';
    badge.href = `https://en.wikipedia.org/wiki/${encodeURIComponent(evt.wiki)}`;
    badge.target = '_blank';
    badge.rel = 'noopener noreferrer';
    badge.addEventListener('click', e => e.stopPropagation());
    card.querySelector('.card-body').appendChild(badge);

    card.addEventListener('click', () => {
      window.open(`https://en.wikipedia.org/wiki/${encodeURIComponent(evt.wiki)}`, '_blank', 'noopener');
    });
  });
}

/* ============================================================
   CONTINUE
============================================================ */
function continueGame() {
  currentRound++;
  if (currentRound >= 3) {
    showResults();
  } else {
    loadRound();
    window.scrollTo(0, 0);
  }
}

/* ============================================================
   RESULTS
============================================================ */
function showResults() {
  showScreen('resultsScreen');

  const pct = totalScore / 300;
  let grade, icon;
  if (pct >= 0.93)      { grade = 'A+'; icon = '🏆'; }
  else if (pct >= 0.80) { grade = 'A';  icon = '🌟'; }
  else if (pct >= 0.67) { grade = 'B';  icon = '😊'; }
  else if (pct >= 0.50) { grade = 'C';  icon = '👍'; }
  else                  { grade = 'D';  icon = '💪'; }

  const gradeColor = pct >= 0.80 ? '#5cbb6f' : pct >= 0.50 ? '#f5832a' : '#e8453c';

  document.getElementById('resIcon').textContent  = icon;
  document.getElementById('resGrade').textContent = grade;
  document.getElementById('resGrade').style.color = gradeColor;
  document.getElementById('resScore').textContent = `Final Score: ${totalScore} / 300`;

  const mode = MODES[currentMode];
  const bd = document.getElementById('resBreakdown');
  bd.innerHTML = '';
  roundScores.forEach(rs => {
    const row = document.createElement('div');
    row.className = 'res-row';
    const roundTitle = mode.rounds[rs.round].title;
    row.innerHTML = `
      <span class="res-row-label">${mode.emoji} Round ${rs.round + 1}: ${roundTitle}</span>
      <span class="res-row-pts">${rs.correct}/5 — +${rs.pts}</span>
    `;
    bd.appendChild(row);
  });
}

/* ============================================================
   UTILITIES
============================================================ */
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
