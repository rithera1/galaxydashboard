<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⏳ Timeline Jumper</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08081e;
    --bg2: #12123a;
    --gold: #f7c948;
    --gold-dim: rgba(247,201,72,0.35);
    --purple: #8b6fff;
    --purple-dim: rgba(139,111,255,0.25);
    --teal: #4adaff;
    --text: #e8e8ff;
    --text-muted: #7a7aaa;
    --card-bg: rgba(255,255,255,0.06);
    --card-border: rgba(160,140,255,0.3);
    --correct: #5cff88;
    --wrong: #ff5566;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; font-family: 'Nunito', sans-serif;
    background: var(--bg); color: var(--text);
    overflow: hidden; -webkit-tap-highlight-color: transparent; user-select: none;
  }

  /* NAV */
  .site-nav {
    display: flex; align-items: center; gap: 1rem;
    padding: 0.6rem 1.25rem; height: 48px;
    background: rgba(18,18,58,0.97);
    border-bottom: 2px solid rgba(139,111,255,0.3);
    position: relative; z-index: 200;
    backdrop-filter: blur(10px);
  }
  .site-nav-back {
    font-family: 'Fredoka One', cursive; font-size: 0.9rem;
    color: var(--text); text-decoration: none;
    background: var(--purple-dim); border: 2px solid var(--purple);
    border-radius: 10px; padding: 0.2rem 0.7rem; transition: background 0.15s;
  }
  .site-nav-back:hover { background: rgba(139,111,255,0.45); }
  .site-nav-title { font-family: 'Fredoka One', cursive; font-size: 1.1rem; color: var(--text); }

  /* SCREENS */
  .screen { display: none; position: absolute; inset: 0; }
  .screen.active { display: flex; flex-direction: column; }

  /* ===== MODE SCREEN ===== */
  #modeScreen {
    top: 48px; align-items: center; justify-content: center;
    padding: 1.5rem 1.25rem 2.5rem; overflow-y: auto; text-align: center;
    background: radial-gradient(ellipse at 50% 0%, #1c1060 0%, #08081e 70%);
  }
  .mode-stars { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
  .mode-content { position: relative; z-index: 1; max-width: 500px; width: 100%; }
  .mode-icon {
    font-size: 5rem; display: block; margin-bottom: 0.4rem;
    animation: iconBob 2.8s ease-in-out infinite;
    filter: drop-shadow(0 0 20px rgba(247,201,72,0.7));
  }
  @keyframes iconBob { 0%,100%{ transform:translateY(0) rotate(-4deg) } 50%{ transform:translateY(-14px) rotate(4deg) } }
  .mode-title {
    font-family: 'Fredoka One', cursive; font-size: clamp(2rem, 7vw, 3rem);
    text-shadow: 0 0 30px rgba(247,201,72,0.5); margin-bottom: 0.5rem; line-height: 1.1;
  }
  .mode-sub { color: var(--text-muted); font-size: 1rem; font-weight: 700; margin-bottom: 2rem; }
  .mode-grid { display: grid; grid-template-columns: 1fr; gap: 0.85rem; max-width: 380px; margin: 0 auto; }
  .mode-btn {
    font-family: 'Fredoka One', cursive; font-size: 1.2rem;
    padding: 1.1rem 1.5rem; border-radius: 18px; border: 2.5px solid currentColor;
    cursor: pointer; text-align: left; display: flex; align-items: center; gap: 0.75rem;
    transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .mode-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
  .mode-us    { background: rgba(220,60,60,0.18);  color: #ff9999; border-color: #e8453c; }
  .mode-world { background: rgba(74,218,255,0.12); color: #90e8ff; border-color: var(--teal); }
  .mode-sci   { background: rgba(139,111,255,0.18); color: #c8b0ff; border-color: var(--purple); }
  .mode-btn-icon { font-size: 2rem; }
  .mode-btn-text { display: flex; flex-direction: column; }
  .mode-btn-name { font-size: 1.2rem; }
  .mode-btn-desc { font-size: 0.72rem; font-weight: 700; opacity: 0.75; margin-top: 0.1rem; }

  /* ===== GAME SCREEN ===== */
  #gameScreen {
    top: 48px; flex-direction: column;
    background: var(--bg);
  }
  .game-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.45rem 0.85rem; gap: 0.5rem; flex-shrink: 0;
    background: rgba(18,18,58,0.85); border-bottom: 1px solid rgba(139,111,255,0.2);
    flex-wrap: wrap;
  }
  .game-round-title { font-family: 'Fredoka One', cursive; font-size: clamp(0.85rem, 3vw, 1.2rem); }
  .game-score-badge {
    font-family: 'Orbitron', monospace; font-size: 0.9rem; font-weight: 700;
    color: var(--gold); text-shadow: 0 0 10px rgba(247,201,72,0.5);
  }
  .game-tip {
    font-size: 0.75rem; font-weight: 700; color: var(--text-muted); font-style: italic;
    flex-basis: 100%;
  }

  /* TIMELINE SECTION */
  .tl-section { flex: 1; min-height: 0; position: relative; }
  #tlViewport {
    width: 100%; height: 100%; position: relative; overflow: hidden;
    cursor: grab; background: linear-gradient(180deg, #09091f 0%, #0e0e32 100%);
  }
  #tlViewport.panning { cursor: grabbing; }
  #tlInner {
    position: absolute; top: 0; height: 100%;
    pointer-events: none; /* individual children handle events */
  }

  /* Timeline axis line */
  .tl-axis {
    position: absolute; left: 0; right: 0;
    height: 3px; border-radius: 2px;
    background: linear-gradient(90deg, transparent, var(--gold) 5%, var(--gold) 95%, transparent);
    box-shadow: 0 0 12px rgba(247,201,72,0.6), 0 0 30px rgba(247,201,72,0.25);
    pointer-events: none;
  }

  /* Year tick marks */
  .tl-tick {
    position: absolute; pointer-events: none;
    display: flex; flex-direction: column; align-items: center;
  }
  .tl-tick-line {
    width: 2px; border-radius: 1px;
    background: rgba(247,201,72,0.55);
  }
  .tl-tick-line.major { background: rgba(247,201,72,0.85); width: 2px; }
  .tl-tick-label {
    font-family: 'Orbitron', monospace; font-size: 0.62rem; font-weight: 700;
    color: rgba(247,201,72,0.75); margin-top: 3px; white-space: nowrap;
  }
  .tl-tick-label.major { color: var(--gold); font-size: 0.72rem; }

  /* Placed event markers */
  .tl-marker {
    position: absolute; display: flex; flex-direction: column; align-items: center;
    cursor: pointer; pointer-events: all;
    transition: transform 0.2s cubic-bezier(.34,1.56,.64,1);
  }
  .tl-marker:hover { transform: translateY(-3px); }
  .tl-marker.above { flex-direction: column-reverse; }
  .tl-marker-stem { width: 2px; height: 28px; background: rgba(200,190,255,0.6); flex-shrink: 0; }
  .tl-marker.above .tl-marker-stem { }
  .tl-marker-dot {
    width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
    border: 2.5px solid var(--purple);
    background: var(--bg2); box-shadow: 0 0 10px rgba(139,111,255,0.7);
  }
  .tl-marker.correct-marker .tl-marker-dot { border-color: var(--correct); box-shadow: 0 0 12px rgba(92,255,136,0.8); background: rgba(92,255,136,0.2); }
  .tl-marker.wrong-marker   .tl-marker-dot { border-color: var(--wrong);   box-shadow: 0 0 12px rgba(255,85,102,0.8); background: rgba(255,85,102,0.1); }

  .tl-marker-card {
    width: clamp(88px, 14vw, 118px);
    background: rgba(20,18,60,0.92);
    border: 2px solid rgba(160,140,255,0.45);
    border-radius: 10px; overflow: hidden;
    box-shadow: 0 4px 18px rgba(0,0,0,0.5);
    transition: border-color 0.3s;
  }
  .tl-marker.correct-marker .tl-marker-card { border-color: var(--correct); }
  .tl-marker.wrong-marker   .tl-marker-card { border-color: var(--wrong); }
  .tl-marker-img-wrap {
    width: 100%; height: 54px; overflow: hidden;
    background: rgba(139,111,255,0.15);
    display: flex; align-items: center; justify-content: center;
    position: relative; font-size: 1.6rem;
  }
  .tl-marker-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; }
  .tl-marker-body { padding: 0.3rem 0.35rem 0.3rem; }
  .tl-marker-title { font-family: 'Fredoka One', cursive; font-size: 0.68rem; line-height: 1.2; color: var(--text); }
  .tl-marker-year-guess { font-family: 'Orbitron', monospace; font-size: 0.62rem; font-weight: 700; color: var(--gold); margin-top: 0.2rem; }
  .tl-marker-score-row { margin-top: 0.2rem; font-size: 0.6rem; font-weight: 800; line-height: 1.2; }
  .tl-marker-remove-hint { font-size: 0.58rem; color: var(--text-muted); margin-top: 0.15rem; opacity: 0.7; }

  /* Correct year ghost marker (shown after check) */
  .tl-correct-marker {
    position: absolute; display: flex; flex-direction: column; align-items: center;
    pointer-events: none;
  }
  .tl-correct-line { width: 1.5px; height: 16px; background: var(--correct); opacity: 0.7; }
  .tl-correct-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--correct); box-shadow: 0 0 10px rgba(92,255,136,0.9);
  }
  .tl-correct-label {
    font-family: 'Orbitron', monospace; font-size: 0.6rem; font-weight: 700;
    color: var(--correct); background: rgba(0,20,0,0.85);
    border: 1px solid var(--correct); border-radius: 4px; padding: 0.1rem 0.35rem;
    margin-top: 3px; white-space: nowrap;
  }

  /* Year tooltip (follows cursor during drag) */
  #yearTooltip {
    position: absolute; top: 8px; pointer-events: none; z-index: 50;
    font-family: 'Orbitron', monospace; font-size: 0.9rem; font-weight: 700;
    color: var(--gold); background: rgba(18,18,58,0.95);
    border: 2px solid var(--gold); border-radius: 10px;
    padding: 0.25rem 0.65rem;
    box-shadow: 0 0 14px rgba(247,201,72,0.5);
    transform: translateX(-50%);
    transition: left 0.03s;
  }
  #yearTooltip.hidden { display: none; }

  /* Pan hint arrows */
  .tl-pan-hint {
    position: absolute; top: 50%; transform: translateY(-50%);
    font-size: 1.4rem; color: rgba(247,201,72,0.5);
    pointer-events: none; z-index: 10;
    animation: hintPulse 2s ease-in-out infinite;
  }
  @keyframes hintPulse { 0%,100%{ opacity:0.3 } 50%{ opacity:0.8 } }
  .tl-pan-hint.left  { left: 8px; }
  .tl-pan-hint.right { right: 8px; }

  /* ROUND RESULT BAR */
  .round-result-bar {
    flex-shrink: 0; background: rgba(18,18,58,0.95);
    border-top: 2px solid rgba(139,111,255,0.3);
    padding: 0.5rem 0.85rem; display: none;
    align-items: center; gap: 0.75rem; flex-wrap: wrap;
  }
  .round-result-bar.visible { display: flex; }
  .rr-icon { font-size: 1.8rem; }
  .rr-text { font-family: 'Fredoka One', cursive; font-size: 1rem; flex: 1; }
  .rr-pts  { font-family: 'Orbitron', monospace; font-size: 1rem; font-weight: 700; color: var(--gold); }

  /* CARDS TRAY */
  .cards-tray-section {
    flex-shrink: 0; background: rgba(12,12,40,0.97);
    border-top: 2px solid rgba(139,111,255,0.25);
    padding: 0.5rem 0.75rem 0.5rem;
  }
  .tray-label { font-family: 'Fredoka One', cursive; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.4rem; }
  .cards-tray {
    display: flex; gap: 0.55rem; overflow-x: auto; padding-bottom: 4px;
    scrollbar-width: thin; scrollbar-color: rgba(139,111,255,0.4) transparent;
  }
  .cards-tray::-webkit-scrollbar { height: 4px; }
  .cards-tray::-webkit-scrollbar-track { background: transparent; }
  .cards-tray::-webkit-scrollbar-thumb { background: rgba(139,111,255,0.4); border-radius: 2px; }

  /* EVENT CARDS in tray */
  .event-card {
    flex-shrink: 0;
    width: clamp(100px, 16vw, 128px);
    background: rgba(25,20,65,0.95);
    border: 2px solid rgba(160,140,255,0.4);
    border-radius: 12px; overflow: hidden;
    cursor: grab; touch-action: none;
    transition: opacity 0.2s, border-color 0.2s, transform 0.15s cubic-bezier(.34,1.56,.64,1);
    position: relative;
  }
  .event-card:hover:not(.placed) { transform: translateY(-3px); border-color: var(--purple); }
  .event-card.placed { opacity: 0.45; cursor: default; }
  .event-card.dragging { opacity: 0.3; }

  .card-img-wrap {
    width: 100%; height: 78px; overflow: hidden;
    background: rgba(139,111,255,0.12);
    display: flex; align-items: center; justify-content: center;
    position: relative; font-size: 2rem;
    border-bottom: 1.5px solid rgba(160,140,255,0.2);
  }
  .card-wiki-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; }
  .img-skeleton {
    position: absolute; inset: 0;
    background: linear-gradient(90deg, rgba(139,111,255,0.1) 25%, rgba(139,111,255,0.2) 50%, rgba(139,111,255,0.1) 75%);
    background-size: 200% 100%; animation: shimmer 1.5s infinite;
  }
  @keyframes shimmer { 0%{ background-position:200% 0 } 100%{ background-position:-200% 0 } }
  .placed-badge {
    position: absolute; inset: 0; background: rgba(10,10,40,0.7);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; display: none;
  }
  .event-card.placed .placed-badge { display: flex; }

  .card-body { padding: 0.4rem 0.45rem; }
  .card-title { font-family: 'Fredoka One', cursive; font-size: 0.73rem; color: var(--text); line-height: 1.2; margin-bottom: 0.2rem; }
  .card-desc  { font-size: 0.62rem; font-weight: 700; color: var(--text-muted); line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  /* DRAG GHOST */
  .drag-ghost {
    position: fixed; pointer-events: none; z-index: 500;
    opacity: 0.92; transform: rotate(4deg) scale(1.06); cursor: grabbing;
    box-shadow: 0 8px 30px rgba(0,0,0,0.7), 0 0 20px rgba(139,111,255,0.4);
  }

  /* ACTION ROW */
  .action-row {
    flex-shrink: 0; display: flex; gap: 0.65rem; justify-content: center;
    padding: 0.5rem 0.75rem;
    background: rgba(12,12,40,0.97); border-top: 1px solid rgba(139,111,255,0.15);
  }
  .check-btn, .continue-btn, .play-again-btn {
    font-family: 'Fredoka One', cursive; font-size: 1.1rem;
    padding: 0.6rem 1.75rem; border-radius: 14px; cursor: pointer;
    border: 2.5px solid currentColor;
    transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.15s;
  }
  .check-btn { background: rgba(139,111,255,0.2); color: #c8b0ff; border-color: var(--purple); }
  .check-btn:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(139,111,255,0.4); }
  .check-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .continue-btn { background: rgba(92,255,136,0.18); color: #90ffb8; border-color: var(--correct); display: none; }
  .continue-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(92,255,136,0.3); }
  .play-again-btn { background: rgba(247,201,72,0.18); color: #ffe890; border-color: var(--gold); }
  .play-again-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(247,201,72,0.3); }

  /* ===== RESULTS SCREEN ===== */
  #resultsScreen {
    top: 48px; align-items: center; justify-content: center;
    padding: 1.5rem 1.25rem 2.5rem; overflow-y: auto; text-align: center;
    background: radial-gradient(ellipse at 50% 0%, #1c1060 0%, #08081e 70%);
  }
  .res-icon  { font-size: 5rem; display: block; margin-bottom: 0.3rem; }
  .res-grade { font-family: 'Fredoka One', cursive; font-size: 5rem; line-height: 1; margin-bottom: 0.3rem; text-shadow: 0 0 25px currentColor; }
  .res-score { font-family: 'Orbitron', monospace; font-size: 1.5rem; font-weight: 700; color: var(--gold); text-shadow: 0 0 12px rgba(247,201,72,0.6); margin-bottom: 1.5rem; }
  .res-breakdown { width: 100%; max-width: 400px; margin: 0 auto 2rem; display: flex; flex-direction: column; gap: 0.55rem; }
  .res-row { display: flex; align-items: center; justify-content: space-between; background: var(--card-bg); border: 1.5px solid var(--card-border); border-radius: 12px; padding: 0.55rem 0.85rem; }
  .res-row-label { font-weight: 800; font-size: 0.85rem; }
  .res-row-pts { font-family: 'Orbitron', monospace; font-size: 1rem; font-weight: 700; color: var(--gold); }

  @keyframes fadeIn { from{ opacity:0 } to{ opacity:1 } }
  @keyframes cardPop { from{ opacity:0; transform:scale(0.8) translateY(15px) } to{ opacity:1; transform:scale(1) translateY(0) } }
</style>
</head>
<body>

<nav class="site-nav">
  <a href="../" class="site-nav-back">← Home</a>
  <span class="site-nav-title">⏳ Timeline Jumper</span>
</nav>

<!-- MODE SCREEN -->
<div class="screen active" id="modeScreen">
  <div class="mode-stars" id="modeStars"></div>
  <div class="mode-content">
    <span class="mode-icon">⏳</span>
    <h1 class="mode-title">Timeline Jumper</h1>
    <p class="mode-sub">🚀 Travel through time — drag each event to its year!</p>
    <div class="mode-grid">
      <button class="mode-btn mode-us" onclick="selectMode('us_history')">
        <span class="mode-btn-icon">🇺🇸</span>
        <div class="mode-btn-text">
          <span class="mode-btn-name">US History</span>
          <span class="mode-btn-desc">Colonial Era · Civil War · Modern America</span>
        </div>
      </button>
      <button class="mode-btn mode-world" onclick="selectMode('world_history')">
        <span class="mode-btn-icon">🌍</span>
        <div class="mode-btn-text">
          <span class="mode-btn-name">World History</span>
          <span class="mode-btn-desc">Medieval · Revolutions · World Wars</span>
        </div>
      </button>
      <button class="mode-btn mode-sci" onclick="selectMode('science')">
        <span class="mode-btn-icon">🔬</span>
        <div class="mode-btn-text">
          <span class="mode-btn-name">Science Discoveries</span>
          <span class="mode-btn-desc">Copernicus to Gravitational Waves</span>
        </div>
      </button>
    </div>
  </div>
</div>

<!-- GAME SCREEN -->
<div class="screen" id="gameScreen">
  <div class="game-header">
    <div class="game-round-title" id="gameRoundTitle">Round 1</div>
    <div class="game-score-badge">⭐ <span id="scoreDisplay">0</span></div>
    <div class="game-tip" id="gameTip">Pan the timeline ← → · Drag cards onto it · Click a placed card to remove it</div>
  </div>
  <div class="tl-section">
    <div id="tlViewport">
      <div id="tlInner"></div>
      <div id="yearTooltip" class="hidden">1492</div>
      <div class="tl-pan-hint left" id="hintLeft">◀</div>
      <div class="tl-pan-hint right" id="hintRight">▶</div>
    </div>
  </div>
  <div class="round-result-bar" id="roundResultBar">
    <span class="rr-icon" id="rrIcon">🎉</span>
    <span class="rr-text" id="rrText">Great job!</span>
    <span class="rr-pts"  id="rrPts">+400</span>
  </div>
  <div class="cards-tray-section">
    <div class="tray-label" id="trayLabel">📦 Drag an event card onto the timeline</div>
    <div class="cards-tray" id="cardsTray"></div>
  </div>
  <div class="action-row">
    <button class="check-btn" id="checkBtn" disabled onclick="checkAnswers()">✓ Check Answers</button>
    <button class="continue-btn" id="continueBtn" onclick="continueGame()">▶ Next Round</button>
  </div>
</div>

<!-- RESULTS SCREEN -->
<div class="screen" id="resultsScreen">
  <span class="res-icon" id="resIcon">🏆</span>
  <div class="res-grade" id="resGrade" style="color:var(--gold)">A</div>
  <div class="res-score" id="resScore">1500 / 1500</div>
  <div class="res-breakdown" id="resBreakdown"></div>
  <button class="play-again-btn" onclick="showScreen('modeScreen')">🎮 Play Again</button>
</div>

<script>
/* ============================================================
   GAME DATA  (5 rounds per mode, 5 events per round)
============================================================ */
const MODES = {
  us_history: {
    name:'US History', emoji:'🇺🇸',
    rounds:[
      { title:'Colonial America', events:[
        { id:'jamestown',    year:1607, title:'Jamestown Founded',          desc:'English settlers establish the first permanent English settlement in America.',       wiki:'Jamestown, Virginia',                                  emoji:'⛵' },
        { id:'mayflower',    year:1620, title:'Mayflower Compact',          desc:'Pilgrims arrive and sign a self-governing agreement in Plymouth.',                     wiki:'Mayflower Compact',                                    emoji:'📜' },
        { id:'declaration',  year:1776, title:'Declaration of Independence',desc:'Thirteen colonies declare independence from Britain.',                                 wiki:'United States Declaration of Independence',            emoji:'🦅' },
        { id:'constitution', year:1788, title:'US Constitution Ratified',   desc:'The states ratify the Constitution, creating the framework of US government.',         wiki:'United States Constitution',                           emoji:'📋' },
        { id:'louisiana',    year:1803, title:'Louisiana Purchase',         desc:"Jefferson doubles the nation's size by buying 828,000 sq miles from France.",          wiki:'Louisiana Purchase',                                   emoji:'🗺️' }
      ]},
      { title:'Civil War Era', events:[

/* ============================================================
   STATE
============================================================ */
let currentMode, currentRoundIdx, totalScore, roundScores;
let currentEvents;            // events for current round
let tlStartYear, tlEndYear, tlSpan, pixelsPerYear, totalTLWidth;
let panOffset = 0, maxPanOffset = 0;
let placements = {};           // eventId -> { year, markerEl }
let checked = false;
let draggingCard = null;       // { evt, ghost, ghostOffX, ghostOffY }
let isPanning = false, panStartX = 0, panStartOffset = 0;
let imageCache = {};

const tlViewport = document.getElementById('tlViewport');
const tlInner    = document.getElementById('tlInner');
const yearTooltip = document.getElementById('yearTooltip');

/* ============================================================
   SCREEN MANAGEMENT
============================================================ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) el.classList.add('active');
}

/* ============================================================
   MODE / ROUND SELECTION
============================================================ */
function selectMode(modeId) {
  currentMode    = modeId;
  currentRoundIdx = 0;
  totalScore     = 0;
  roundScores    = [];
  showScreen('gameScreen');
  loadRound();
}

function loadRound() {
  checked = false;
  placements = {};
  document.getElementById('roundResultBar').classList.remove('visible');
  document.getElementById('checkBtn').disabled = true;
  document.getElementById('checkBtn').style.display = '';
  document.getElementById('continueBtn').style.display = 'none';

  const mode  = MODES[currentMode];
  const round = mode.rounds[currentRoundIdx];
  currentEvents = shuffle([...round.events]);

  document.getElementById('gameRoundTitle').textContent =
    `${mode.emoji} Round ${currentRoundIdx + 1}/3 — ${round.title}`;
  document.getElementById('scoreDisplay').textContent = totalScore;

  buildTimeline(round.events);
  buildCardsTray(currentEvents);
  loadImages(currentEvents);
}

/* ============================================================
   TIMELINE BUILDER
============================================================ */
function buildTimeline(events) {
  const years = events.map(e => e.year);
  const minYear = Math.min(...years);
  const maxYear = Math.max(...years);
  const eventSpan = Math.max(maxYear - minYear, 50);

  tlStartYear = minYear - (Math.floor(Math.random() * 151) + 50);   // 50-200 before
  tlEndYear   = maxYear + (Math.floor(Math.random() * 251) + 50);   // 50-300 after
  tlSpan      = tlEndYear - tlStartYear;

  const vw = tlViewport.clientWidth || window.innerWidth;
  pixelsPerYear = Math.max(4, Math.min(14, 2600 / tlSpan));
  totalTLWidth  = Math.max(vw * 2.5, tlSpan * pixelsPerYear);
  pixelsPerYear = totalTLWidth / tlSpan;  // recompute with final width

  maxPanOffset = Math.max(0, totalTLWidth - vw);
  // Start panned so that the first event is roughly centered
  const firstEventX = yearToX(minYear);
  panOffset = Math.max(0, Math.min(maxPanOffset, firstEventX - vw * 0.35));

  tlInner.innerHTML = '';
  tlInner.style.width  = totalTLWidth + 'px';

  // Timeline line height (center of viewport)
  const vh = tlViewport.clientHeight || 200;
  const axisY = Math.round(vh * 0.52);

  // Axis line
  const axis = document.createElement('div');
  axis.className = 'tl-axis';
  axis.style.top = axisY + 'px';
  tlInner.appendChild(axis);

  // Tick interval
  let tickInterval;
  if (tlSpan <= 80)        tickInterval = 10;
  else if (tlSpan <= 200)  tickInterval = 25;
  else if (tlSpan <= 500)  tickInterval = 50;
  else if (tlSpan <= 1000) tickInterval = 100;
  else                     tickInterval = 200;

  const firstTick = Math.ceil(tlStartYear / tickInterval) * tickInterval;
  for (let yr = firstTick; yr <= tlEndYear; yr += tickInterval) {
    const isMajor = yr % (tickInterval * 4) === 0 || tickInterval >= 100;
    const tick = document.createElement('div');
    tick.className = 'tl-tick';
    const x = yearToX(yr);
    tick.style.left = x + 'px';
    tick.style.top  = (axisY - (isMajor ? 16 : 8)) + 'px';
    tick.style.transform = 'translateX(-50%)';

    const line = document.createElement('div');
    line.className = 'tl-tick-line' + (isMajor ? ' major' : '');
    line.style.height = (isMajor ? 16 : 8) + 'px';

    const label = document.createElement('div');
    label.className = 'tl-tick-label' + (isMajor ? ' major' : '');
    label.textContent = yr < 0 ? (Math.abs(yr) + ' BCE') : yr;

    tick.appendChild(line);
    tick.appendChild(label);
    tlInner.appendChild(tick);
  }

  applyPan();
  updateHintArrows();
}

function yearToX(year) {
  return Math.round((year - tlStartYear) / tlSpan * totalTLWidth);
}
function xToYear(innerX) {
  return Math.round(tlStartYear + innerX / totalTLWidth * tlSpan);
}
function clientXToYear(clientX) {
  const rect = tlViewport.getBoundingClientRect();
  const innerX = (clientX - rect.left) + panOffset;
  return xToYear(innerX);
}

function applyPan() {
  tlInner.style.transform = `translateX(-${panOffset}px)`;
}

function updateHintArrows() {
  document.getElementById('hintLeft').style.opacity  = panOffset > 10 ? '' : '0';
  document.getElementById('hintRight').style.opacity = panOffset < maxPanOffset - 10 ? '' : '0';
}

/* ============================================================
   CARDS TRAY
============================================================ */
function buildCardsTray(events) {
  const tray = document.getElementById('cardsTray');
  tray.innerHTML = '';
  events.forEach(evt => {
    const card = createTrayCard(evt);
    tray.appendChild(card);
  });
}

function createTrayCard(evt) {
  const card = document.createElement('div');
  card.className = 'event-card';
  card.dataset.id = evt.id;
  card.innerHTML = `
    <div class="card-img-wrap">
      <div class="img-skeleton"></div>
      <span class="card-emoji">${evt.emoji}</span>
      <img class="card-wiki-img" alt="${evt.title}" draggable="false">
      <div class="placed-badge">✅</div>
    </div>
    <div class="card-body">
      <div class="card-title">${evt.title}</div>
      <div class="card-desc">${evt.desc}</div>
    </div>
  `;
  card.addEventListener('pointerdown', e => onCardPointerDown(e, evt));
  return card;
}

/* ============================================================
   WIKIPEDIA IMAGES
============================================================ */
async function fetchWikiImage(title) {
  if (imageCache[title] !== undefined) return imageCache[title];
  try {
    const url = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=pageimages&pithumbsize=300&format=json&origin=*`;
    const res = await fetch(url, { signal: AbortSignal.timeout(6000) });
    const data = await res.json();
    const page = Object.values(data.query.pages)[0];
    const src  = page?.thumbnail?.source || null;
    imageCache[title] = src;
    return src;
  } catch { imageCache[title] = null; return null; }
}

function loadImages(events) {
  events.forEach(async evt => {
    const src = await fetchWikiImage(evt.wiki);
    // Update tray card
    const card = document.querySelector(`.event-card[data-id="${evt.id}"]`);
    if (card && src) {
      const img  = card.querySelector('.card-wiki-img');
      const emoji = card.querySelector('.card-emoji');
      const skel  = card.querySelector('.img-skeleton');
      img.src = src;
      img.onload = () => { skel?.remove(); emoji.style.display = 'none'; img.style.display = 'block'; };
      img.onerror = () => skel?.remove();
    } else if (card) {
      card.querySelector('.img-skeleton')?.remove();
    }
    // Update any existing timeline marker
    const marker = document.querySelector(`.tl-marker[data-id="${evt.id}"]`);
    if (marker && src) {
      const mImg  = marker.querySelector('.tl-marker-img');
      const mEmoji = marker.querySelector('.tl-marker-emoji');
      if (mImg) { mImg.src = src; mImg.onload = () => { mImg.style.display = 'block'; if (mEmoji) mEmoji.style.display = 'none'; }; }
    }
  });
}

/* ============================================================
   CARD DRAG
============================================================ */
function onCardPointerDown(e, evt) {
  if (checked) return;
  const card = e.currentTarget;
  if (card.classList.contains('placed')) return; // click to unplace handled by marker

  e.preventDefault();
  e.stopPropagation();

  const rect = card.getBoundingClientRect();
  const ghost = card.cloneNode(true);
  ghost.className = card.className + ' drag-ghost';
  ghost.style.width = rect.width + 'px';
  ghost.style.left  = rect.left  + 'px';
  ghost.style.top   = rect.top   + 'px';
  document.body.appendChild(ghost);
  card.classList.add('dragging');

  draggingCard = {
    evt, card,
    ghost,
    ghostOffX: e.clientX - rect.left,
    ghostOffY: e.clientY - rect.top
  };
}

/* ============================================================
   TIMELINE PAN
============================================================ */
tlViewport.addEventListener('pointerdown', e => {
  if (draggingCard) return;
  if (e.target.closest('.tl-marker')) return;
  isPanning = true;
  panStartX = e.clientX;
  panStartOffset = panOffset;
  tlViewport.classList.add('panning');
  tlViewport.setPointerCapture(e.pointerId);
}, { passive: false });

/* ============================================================
   UNIFIED POINTER MOVE / UP
============================================================ */
document.addEventListener('pointermove', e => {
  if (draggingCard) {
    draggingCard.ghost.style.left = (e.clientX - draggingCard.ghostOffX) + 'px';
    draggingCard.ghost.style.top  = (e.clientY - draggingCard.ghostOffY) + 'px';

    // Show year tooltip if hovering over timeline
    const rect = tlViewport.getBoundingClientRect();
    if (e.clientY >= rect.top && e.clientY <= rect.bottom && e.clientX >= rect.left && e.clientX <= rect.right) {
      const yr = clientXToYear(e.clientX);
      yearTooltip.textContent = yr < 0 ? (Math.abs(yr) + ' BCE') : yr;
      const relX = e.clientX - rect.left;
      yearTooltip.style.left = Math.max(40, Math.min(rect.width - 40, relX)) + 'px';
      yearTooltip.classList.remove('hidden');
    } else {
      yearTooltip.classList.add('hidden');
    }
    return;
  }
  if (isPanning) {
    const dx = e.clientX - panStartX;
    panOffset = Math.max(0, Math.min(maxPanOffset, panStartOffset - dx));
    applyPan();
    updateHintArrows();
  }
}, { passive: true });

document.addEventListener('pointerup', e => {
  yearTooltip.classList.add('hidden');

  if (draggingCard) {
    const { evt, card, ghost } = draggingCard;
    ghost.remove();
    card.classList.remove('dragging');

    const rect = tlViewport.getBoundingClientRect();
    if (e.clientY >= rect.top && e.clientY <= rect.bottom &&
        e.clientX >= rect.left && e.clientX <= rect.right) {
      // Dropped on timeline
      const guessedYear = clientXToYear(e.clientX);
      placeEvent(evt, guessedYear);
    }
    draggingCard = null;
    updateCheckButton();
    return;
  }

  if (isPanning) {
    isPanning = false;
    tlViewport.classList.remove('panning');
  }
});

/* ============================================================
   PLACE EVENT ON TIMELINE
============================================================ */
function placeEvent(evt, year) {
  // Remove previous placement if any
  unplaceEvent(evt.id, false);

  // Mark card as placed
  const card = document.querySelector(`.event-card[data-id="${evt.id}"]`);
  if (card) card.classList.add('placed');

  const x = yearToX(year);
  const vh = tlViewport.clientHeight || 200;
  const axisY = Math.round(vh * 0.52);

  // Alternate above/below
  const placedCount = Object.keys(placements).length;
  const isAbove = placedCount % 2 === 0;
  const stemH = 32 + (placedCount % 3) * 12; // vary height slightly

  const marker = document.createElement('div');
  marker.className = 'tl-marker' + (isAbove ? ' above' : '');
  marker.dataset.id = evt.id;
  marker.style.left = x + 'px';
  marker.style.top  = isAbove
    ? (axisY - stemH - 54 - 10) + 'px'
    : (axisY + 10) + 'px';
  marker.style.transform = 'translateX(-50%)';
  marker.style.zIndex = 20 + placedCount;

  const imgSrc = imageCache[evt.wiki];
  const imgHtml = imgSrc
    ? `<img class="tl-marker-img" src="${imgSrc}" style="display:block" alt="">`
    : `<span class="tl-marker-emoji">${evt.emoji}</span><img class="tl-marker-img" alt="">`;

  const yearDisplay = year < 0 ? Math.abs(year) + ' BCE' : year;

  marker.innerHTML = `
    <div class="tl-marker-card">
      <div class="tl-marker-img-wrap">${imgHtml}</div>
      <div class="tl-marker-body">
        <div class="tl-marker-title">${evt.title}</div>
        <div class="tl-marker-year-guess">${yearDisplay}</div>
        <div class="tl-marker-remove-hint">Tap to remove</div>
      </div>
    </div>
    <div class="tl-marker-stem" style="height:${stemH}px"></div>
    <div class="tl-marker-dot"></div>
  `;

  if (isAbove) {
    // Reverse DOM order for above layout
    const children = [...marker.children];
    children.reverse().forEach(c => marker.appendChild(c));
  }

  marker.addEventListener('pointerdown', e => {
    if (checked) return;
    e.stopPropagation();
    unplaceEvent(evt.id, true);
    updateCheckButton();
  });

  tlInner.appendChild(marker);
  placements[evt.id] = { year, markerEl: marker };
}

function unplaceEvent(id, restoreCard) {
  if (placements[id]) {
    placements[id].markerEl.remove();
    delete placements[id];
  }
  if (restoreCard) {
    const card = document.querySelector(`.event-card[data-id="${id}"]`);
    if (card) card.classList.remove('placed');
  }
}

function updateCheckButton() {
  const mode  = MODES[currentMode];
  const round = mode.rounds[currentRoundIdx];
  const allPlaced = round.events.every(e => placements[e.id] !== undefined);
  document.getElementById('checkBtn').disabled = !allPlaced;
}

/* ============================================================
   CHECK ANSWERS
============================================================ */
function checkAnswers() {
  if (checked) return;
  checked = true;

  const mode   = MODES[currentMode];
  const round  = mode.rounds[currentRoundIdx];
  const events = round.events;

  const years  = events.map(e => e.year);
  const eventSpan = Math.max(Math.max(...years) - Math.min(...years), 50);

  let roundPts = 0;
  const vh = tlViewport.clientHeight || 200;
  const axisY = Math.round(vh * 0.52);

  events.forEach(evt => {
    const p = placements[evt.id];
    if (!p) return;
    const dist = Math.abs(p.year - evt.year);
    const score = calcScore(dist, eventSpan);
    roundPts += score;
    p.score = score;

    // Color the marker
    const marker = p.markerEl;
    marker.classList.add(score >= 60 ? 'correct-marker' : 'wrong-marker');
    const markerBody = marker.querySelector('.tl-marker-body');

    // Add score display
    const scoreRow = marker.querySelector('.tl-marker-score-row') || document.createElement('div');
    scoreRow.className = 'tl-marker-score-row';
    scoreRow.style.color = score >= 80 ? 'var(--correct)' : score >= 50 ? 'var(--gold)' : 'var(--wrong)';
    scoreRow.textContent = `${score}/100 pts`;
    if (!markerBody.querySelector('.tl-marker-score-row')) markerBody.insertBefore(scoreRow, markerBody.querySelector('.tl-marker-remove-hint'));

    // Remove "tap to remove" hint
    marker.querySelector('.tl-marker-remove-hint')?.remove();

    // Show correct year marker if off
    if (dist > 2) {
      const correctX = yearToX(evt.year);
      const correctMarker = document.createElement('div');
      correctMarker.className = 'tl-correct-marker';
      const isAbove = marker.classList.contains('above');
      correctMarker.style.left = correctX + 'px';
      correctMarker.style.top  = (axisY + (isAbove ? 10 : -44)) + 'px';
      correctMarker.style.transform = 'translateX(-50%)';
      correctMarker.innerHTML = `
        <div class="tl-correct-dot"></div>
        <div class="tl-correct-line"></div>
        <div class="tl-correct-label">✓ ${evt.year < 0 ? Math.abs(evt.year)+' BCE' : evt.year}</div>
      `;
      if (!isAbove) {
        const children = [...correctMarker.children];
        children.reverse().forEach(c => correctMarker.appendChild(c));
      }
      tlInner.appendChild(correctMarker);
    }
  });

  totalScore += roundPts;
  roundScores.push({ round: currentRoundIdx, pts: roundPts, title: round.title });
  document.getElementById('scoreDisplay').textContent = totalScore;

  // Result bar
  const maxPts = events.length * 100;
  const pct = roundPts / maxPts;
  const icons = pct >= 0.8 ? '🏆' : pct >= 0.6 ? '🎉' : pct >= 0.4 ? '👍' : '💪';
  const msgs  = pct >= 0.8 ? 'Excellent time travel!' : pct >= 0.6 ? 'Great job!' : pct >= 0.4 ? 'Good effort!' : 'Keep practicing!';
  document.getElementById('rrIcon').textContent = icons;
  document.getElementById('rrText').textContent = msgs;
  document.getElementById('rrPts').textContent  = `+${roundPts} pts`;
  document.getElementById('roundResultBar').classList.add('visible');

  // Add Wikipedia badges to placed markers
  events.forEach(evt => {
    const p = placements[evt.id];
    if (!p) return;
    const badge = document.createElement('a');
    badge.className = 'card-wiki-badge';
    badge.style.cssText = 'display:inline-block;font-size:0.58rem;font-weight:800;color:#4adaff;background:rgba(74,218,255,0.1);border:1px solid rgba(74,218,255,0.5);border-radius:5px;padding:0.1rem 0.35rem;margin-top:0.2rem;text-decoration:none;cursor:pointer';
    badge.textContent = '📖 Wiki';
    badge.href   = `https://en.wikipedia.org/wiki/${encodeURIComponent(evt.wiki)}`;
    badge.target = '_blank'; badge.rel = 'noopener noreferrer';
    badge.addEventListener('click', e => e.stopPropagation());
    p.markerEl.querySelector('.tl-marker-body')?.appendChild(badge);
  });

  // Disable dragging
  document.querySelectorAll('.event-card').forEach(c => { c.style.cursor = 'default'; c.style.opacity = '0.5'; });

  document.getElementById('checkBtn').style.display = 'none';
  const cb = document.getElementById('continueBtn');
  cb.style.display = '';
  cb.textContent = currentRoundIdx < 2 ? `▶ Round ${currentRoundIdx + 2}` : '🏁 See Final Score';
}

function calcScore(dist, eventSpan) {
  const maxDist = Math.max(eventSpan * 0.4, 20);
  return Math.max(0, Math.round(100 * Math.max(0, 1 - dist / maxDist)));
}

/* ============================================================
   CONTINUE
============================================================ */
function continueGame() {
  currentRoundIdx++;
  if (currentRoundIdx >= 3) {
    showResults();
  } else {
    loadRound();
  }
}

/* ============================================================
   RESULTS
============================================================ */
function showResults() {
  showScreen('resultsScreen');
  const maxTotal = 3 * 5 * 100;
  const pct = totalScore / maxTotal;
  let grade, icon;
  if (pct >= 0.90)      { grade = 'A+'; icon = '🏆'; }
  else if (pct >= 0.75) { grade = 'A';  icon = '🌟'; }
  else if (pct >= 0.60) { grade = 'B';  icon = '😊'; }
  else if (pct >= 0.45) { grade = 'C';  icon = '👍'; }
  else                  { grade = 'D';  icon = '💪'; }
  const gc = pct >= 0.75 ? 'var(--correct)' : pct >= 0.45 ? 'var(--gold)' : 'var(--wrong)';
  document.getElementById('resIcon').textContent  = icon;
  document.getElementById('resGrade').textContent = grade;
  document.getElementById('resGrade').style.color = gc;
  document.getElementById('resScore').textContent = `${totalScore} / ${maxTotal} pts`;

  const mode = MODES[currentMode];
  const bd   = document.getElementById('resBreakdown');
  bd.innerHTML = '';
  roundScores.forEach(rs => {
    const row = document.createElement('div');
    row.className = 'res-row';
    row.innerHTML = `
      <span class="res-row-label">${mode.emoji} Round ${rs.round + 1}: ${rs.title}</span>
      <span class="res-row-pts">${rs.pts} / 500</span>
    `;
    bd.appendChild(row);
  });
}

/* ============================================================
   UTILITIES
============================================================ */
function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

/* ============================================================
   MODE SCREEN STARS
============================================================ */
(function() {
  const layer = document.getElementById('modeStars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    const size = 1 + Math.random() * 3;
    Object.assign(s.style, {
      position:'absolute', width:size+'px', height:size+'px', borderRadius:'50%', background:'#fff',
      opacity:(Math.random()*0.4+0.05).toFixed(2),
      left:Math.random()*100+'%', top:Math.random()*100+'%',
      animation:`starTwinkle ${(2.5+Math.random()*3).toFixed(1)}s ease-in-out infinite`,
      animationDelay:(Math.random()*5).toFixed(1)+'s'
    });
    layer.appendChild(s);
  }
})();
const sty = document.createElement('style');
sty.textContent = '@keyframes starTwinkle{0%,100%{opacity:0.05}50%{opacity:0.45}}';
document.head.appendChild(sty);
</script>
